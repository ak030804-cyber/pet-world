<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>寵物世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f23;font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;max-width:480px;margin:0 auto;overflow:hidden}
/* ===== Title ===== */
#title{display:flex;flex-direction:column;height:100%;width:100%;background:linear-gradient(180deg,#0f0f23 0%,#1a1a3e 40%,#2d1b4e 100%);align-items:center;justify-content:center;position:absolute;top:0;left:0;z-index:10}
.title-bg{position:absolute;width:100%;height:100%;overflow:hidden;pointer-events:none}
.title-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.title-logo{font-size:40px;font-weight:900;background:linear-gradient(135deg,#f5d76e,#ff9500,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;margin-bottom:4px;letter-spacing:3px;position:relative;z-index:1}
.title-sub{color:#8a8aba;font-size:14px;margin-bottom:24px;position:relative;z-index:1;letter-spacing:1px}
.starter-pick{display:flex;gap:14px;margin:8px 0 20px;position:relative;z-index:1}
.starter-card{background:linear-gradient(180deg,#2a2a4a,#1e1e3a);border:2px solid #3a3a5a;border-radius:16px;padding:16px 10px 12px;text-align:center;cursor:pointer;width:96px;transition:all .2s;position:relative}
.starter-card.selected{border-color:#f5d76e;background:linear-gradient(180deg,#3a2a4a,#2a1e3a);box-shadow:0 0 20px rgba(245,215,110,.2)}
.starter-card .sprite-box{width:64px;height:64px;margin:0 auto 6px;position:relative}
.starter-card .sprite-box canvas{width:64px;height:64px}
.starter-card .name{color:#fff;font-size:13px;font-weight:bold}
.starter-card .element{font-size:10px;color:#8a8aba;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:2px;background:#2a2a4a}
.starter-card.selected .element{background:#4a3a2a;color:#f5d76e}
.title-btn{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:14px;color:#1a1a2e;font-size:18px;font-weight:bold;padding:14px 48px;cursor:pointer;box-shadow:0 4px 0 #b87200,0 6px 20px rgba(255,149,0,.3);position:relative;z-index:1;transition:all .1s}
.title-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #b87200}
.title-btn:disabled{opacity:.4;transform:none;box-shadow:none;cursor:default}

/* ===== Overworld ===== */
#overworld{display:none;flex-direction:column;height:100%;width:100%;position:relative}
#gameCanvas{flex:1;width:100%;display:block;touch-action:none;background:#3a6b3a}
#overlayUI{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;pointer-events:none;z-index:5}
.location-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:4px 12px;color:#fff;font-size:12px;font-weight:bold;pointer-events:auto}
.partner-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:4px 10px;color:#fff;font-size:11px;pointer-events:auto;display:flex;align-items:center;gap:4px}
#controls{background:linear-gradient(180deg,#1a1a3a,#0f0f23);padding:10px 12px 14px;display:flex;justify-content:center;align-items:center;gap:10px;flex-shrink:0;border-top:1px solid #2a2a4a}
.dpad{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:44px 44px;gap:3px;justify-content:center}
.dpad-btn{background:linear-gradient(135deg,#2a2a4a,#1e1e3e);border:1px solid #3a3a5a;border-radius:10px;color:#aaa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;box-shadow:inset 0 -2px 0 #0f0f23}
.dpad-btn:active{background:linear-gradient(135deg,#3a3a5a,#2a2a4a);transform:scale(.93);color:#fff}
.btn-up{grid-column:2;grid-row:1}
.btn-left{grid-column:1;grid-row:2}
.btn-down{grid-column:2;grid-row:2}
.btn-right{grid-column:3;grid-row:2}
.menu-btn{background:linear-gradient(135deg,#3a2a4a,#2a1e3a);border:1px solid #5a4a6a;border-radius:10px;color:#d0b0e0;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;box-shadow:inset 0 -2px 0 #1a0f2a;white-space:nowrap}
.menu-btn:active{transform:scale(.95)}

/* ===== Battle ===== */
#battle{display:none;flex-direction:column;height:100%;width:100%;position:relative}
#battleCanvas{width:100%;flex:1;display:block;touch-action:none}
.battle-panel{background:linear-gradient(180deg,#1a1a3a,#0f0f23);flex-shrink:0;border-top:2px solid #2a2a4a;padding:8px 10px 14px}
.battle-hud{display:flex;gap:8px;margin-bottom:6px}
.hp-card{flex:1;background:rgba(255,255,255,.06);border-radius:10px;padding:6px 10px;backdrop-filter:blur(4px)}
.hp-card .top{display:flex;justify-content:space-between;align-items:center}
.hp-card .pname{color:#fff;font-size:13px;font-weight:bold}
.hp-card .plv{color:#8a8aba;font-size:10px}
.hp-card .bar-wrap{height:7px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;margin:3px 0 2px}
.hp-card .bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-fill.green{background:linear-gradient(90deg,#4cd964,#34c759);box-shadow:0 0 6px rgba(76,217,100,.4)}
.bar-fill.yellow{background:linear-gradient(90deg,#ff9500,#ffcc00);box-shadow:0 0 6px rgba(255,149,0,.4)}
.bar-fill.red{background:linear-gradient(90deg,#ff3b30,#ff6b6b);box-shadow:0 0 6px rgba(255,59,48,.4)}
.hp-card .num{color:#8a8aba;font-size:10px;text-align:right}
.battle-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.act-btn{background:linear-gradient(135deg,#2a2a4a,#1e1e3e);border:1px solid #3a3a5a;border-radius:10px;color:#ccc;font-size:14px;font-weight:bold;padding:12px 0;text-align:center;cursor:pointer;box-shadow:inset 0 -2px 0 #0f0f23;transition:all .1s}
.act-btn:active{transform:scale(.95);background:#3a3a5a}
.act-btn.primary{background:linear-gradient(135deg,#e8a838,#d4892a);border-color:#e8a838;color:#1a1a2e;box-shadow:inset 0 -2px 0 #a06a10}
.act-btn.success{background:linear-gradient(135deg,#4cd964,#34c759);border-color:#4cd964;color:#1a1a2e;box-shadow:inset 0 -2px 0 #2a9a3a}
.act-btn.danger{background:linear-gradient(135deg,#ff3b30,#d62d20);border-color:#ff3b30;color:#fff;box-shadow:inset 0 -2px 0 #8a1a10}
.battle-msg{background:rgba(0,0,0,.5);border-radius:10px;padding:8px 12px;color:#ddd;font-size:13px;line-height:1.4;min-height:36px;text-align:center;backdrop-filter:blur(4px)}

/* ===== Modals ===== */
.modal-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:20;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border-radius:18px;padding:24px;max-width:88%;width:320px;text-align:center;border:1px solid #3a3a5a;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.modal-title{color:#fff;font-size:18px;font-weight:bold;margin-bottom:8px}
.modal-text{color:#b0b0d0;font-size:13px;line-height:1.6;margin-bottom:16px;white-space:pre-wrap}
.modal-btn{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:12px;color:#1a1a2e;font-size:15px;font-weight:bold;padding:12px 32px;cursor:pointer;box-shadow:0 3px 0 #b87200}
.modal-btn:active{transform:translateY(3px);box-shadow:0 0 0 #b87200}
.lvup-overlay,.evo-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:10px}
.lvup-text{font-size:40px;font-weight:900;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.5),0 4px 10px rgba(0,0,0,.5);animation:lvAnim 1.2s ease-out forwards}
@keyframes lvAnim{0%{transform:scale(2) rotate(-5deg);opacity:0}30%{transform:scale(1) rotate(0);opacity:1}60%{opacity:1}100%{opacity:0;transform:scale(.8) translateY(-30px)}}
.evo-overlay{background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);z-index:40}
.evo-text{font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 50px rgba(255,255,255,.6);animation:evoPulse 2s ease-out}
.evo-sub{color:#ffd700;font-size:16px;opacity:0;animation:fadeIn 1s ease-out 1s forwards}
@keyframes evoPulse{0%{transform:scale(3);opacity:0}20%{transform:scale(1);opacity:1}50%{transform:scale(1.15);color:#ffd700}80%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes fadeIn{to{opacity:1}}

/* ===== Bag ===== */
.bag-list{max-height:50vh;overflow-y:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.bag-item{display:flex;align-items:center;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;border-radius:8px;transition:background .15s}
.bag-item:active{background:rgba(255,255,255,.06)}
.bag-item.active{background:rgba(245,215,110,.12)}
.bag-item .s{width:36px;height:36px;margin-right:8px;flex-shrink:0}
.bag-item .info{flex:1;min-width:0}
.bag-item .n{color:#fff;font-size:13px;font-weight:bold}
.bag-item .d{color:#7a7a9a;font-size:10px;margin-top:1px}
.bag-item .tag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.06);color:#8a8aba;margin-left:6px}
.swap-btn{background:linear-gradient(135deg,#3a3a5a,#2a2a4a);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:bold;padding:6px 12px;cursor:pointer}
.swap-btn:active{transform:scale(.9)}
</style>
</head>
<body>
<div id="app">
  <!-- Title -->
  <div id="title">
    <div class="title-bg" id="starBG"></div>
    <div class="title-logo">寵物世界</div>
    <div class="title-sub">揀你嘅第一隻夥伴</div>
    <div class="starter-pick" id="starterPick"></div>
    <button class="title-btn" id="startBtn" disabled onclick="startGame()">出發冒險！</button>
  </div>

  <!-- Overworld -->
  <div id="overworld">
    <div id="overlayUI">
      <div class="location-badge" id="locBadge">🌿 草原</div>
      <div class="partner-badge" id="partnerBadge"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
      <div class="dpad">
        <div class="dpad-btn btn-up" ontouchstart="movePlayer(0,-1)" onmousedown="movePlayer(0,-1)">▲</div>
        <div class="dpad-btn btn-left" ontouchstart="movePlayer(-1,0)" onmousedown="movePlayer(-1,0)">◀</div>
        <div class="dpad-btn btn-down" ontouchstart="movePlayer(0,1)" onmousedown="movePlayer(0,1)">▼</div>
        <div class="dpad-btn btn-right" ontouchstart="movePlayer(1,0)" onmousedown="movePlayer(1,0)">▶</div>
      </div>
      <button class="menu-btn" onclick="showBag()">🎒 寵物</button>
    </div>
  </div>

  <!-- Battle -->
  <div id="battle">
    <canvas id="battleCanvas"></canvas>
    <div class="battle-panel">
      <div class="battle-hud">
        <div class="hp-card"><div class="top"><span class="pname" id="myPN">火火</span><span class="plv" id="myPL">Lv.1</span></div><div class="bar-wrap"><div class="bar-fill green" id="myBar" style="width:100%"></div></div><div class="num" id="myNum">100/100</div></div>
        <div class="hp-card"><div class="top"><span class="pname" id="enPN">比比</span><span class="plv" id="enPL">Lv.1</span></div><div class="bar-wrap"><div class="bar-fill green" id="enBar" style="width:100%"></div></div><div class="num" id="enNum">100/100</div></div>
      </div>
      <div class="battle-actions" id="btlActs"></div>
      <div class="battle-msg" id="btlMsg">選擇行動！</div>
    </div>
  </div>

  <!-- Overlays -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box"><div class="modal-title" id="modalT"></div><div class="modal-text" id="modalX"></div><button class="modal-btn" onclick="closeModal()">確定</button></div>
  </div>
  <div class="lvup-overlay" id="lvupO"><div class="lvup-text" id="lvupT"></div></div>
  <div class="evo-overlay" id="evoO"><div class="evo-text" id="evoT"></div><div class="evo-sub" id="evoSub"></div></div>
  <div class="modal-overlay" id="bagModal">
    <div class="modal-box" style="width:300px;text-align:left" onclick="event.stopPropagation()">
      <div class="modal-title" style="text-align:center">🎒 寵物隊伍</div>
      <div class="bag-list" id="bagList"></div>
      <button class="modal-btn" onclick="document.getElementById('bagModal').style.display='none'" style="width:100%;box-sizing:border-box">關閉</button>
    </div>
  </div>
</div>

<script>
// ===== CUTE CREATURE DRAWING ENGINE =====
// Draws chibi-style cute pets using smooth canvas shapes
function drawEye(ctx, x, y, r){
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y,r,r*1.1,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(x+1,y+1,r*.55,r*.65,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-2,y-2,r*.25,0,Math.PI*2);ctx.fill();
}
function drawBlush(ctx,x,y,r){ctx.fillStyle='rgba(255,150,150,.35)';ctx.beginPath();ctx.ellipse(x,y,r,r*.6,0,0,Math.PI*2);ctx.fill();}
function drawMouth(ctx,x,y,s){ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,s,.1*Math.PI,.9*Math.PI);ctx.stroke();}

function drawCreature(ctx,type,x,y,sz,anim=0){
  const b=Math.sin(anim*.06)*2,s=sz/2;
  function body(c1,c2,rx,ry){const g=ctx.createRadialGradient(x-ry*.2,y-ry*.4,0,x,y,ry);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y+b,rx,ry,0,0,Math.PI*2);ctx.fill();}
  function leg(x2,y2,c,sw,sh){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x2,y2+b,sw,sh,0,0,Math.PI*2);ctx.fill();}
  
  if(type==='fire'||type==='fire2'){
    const e=type==='fire2';
    body(e?'#ff6b35':'#ff8c42',e?'#c0392b':'#d63031',s*.85,e?s*1.05:s*.95);
    for(let i=-1;i<=1;i++){
      const fx=x+i*s*.4,fy=y-s*.8+b,fs=e?s*.45:s*.35;
      const g=ctx.createRadialGradient(fx,fy,0,fx,fy,fs);g.addColorStop(0,'#ffd93d');g.addColorStop(.5,'#ff9500');g.addColorStop(1,'#d63031');
      ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(fx,fy+fs);ctx.quadraticCurveTo(fx-fs*.8,fy-fs*.2,fx,fy-fs*.5);ctx.quadraticCurveTo(fx+fs*.8,fy-fs*.2,fx,fy+fs);ctx.fill();
    }
    drawEye(ctx,x-s*.2,y-s*.1+b,s*.22);drawEye(ctx,x+s*.2,y-s*.1+b,s*.22);
    drawBlush(ctx,x-s*.4,y+s*.15+b,s*.18);drawBlush(ctx,x+s*.4,y+s*.15+b,s*.18);
    drawMouth(ctx,x,y+s*.2+b,s*.08);
    leg(x-s*.3,y+s*.75+b,e?'#8e1a1a':'#b0302a',s*.2,s*.15);leg(x+s*.3,y+s*.75+b,e?'#8e1a1a':'#b0302a',s*.2,s*.15);
    const tx=x-s*.8,ty=y+s*.3+b,ts=s*.25;
    ctx.fillStyle='#ff9500';ctx.beginPath();ctx.ellipse(tx,ty,ts,ts*.6,.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd93d';ctx.beginPath();ctx.arc(tx-ts*.3,ty-ts*.3,ts*.4,0,Math.PI*2);ctx.fill();
  }else if(type==='water'||type==='water2'){
    const e=type==='water2';
    body(e?'#74b9ff':'#81ecec',e?'#0984e3':'#00b894',s*.9,e?s*1.05:s*.95);
    const cx=x,cy=y-s*.8+b,cs=e?s*.4:s*.3;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,cs);g.addColorStop(0,'#a8e6cf');g.addColorStop(.5,'#81ecec');g.addColorStop(1,'#0984e3');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(cx,cy,cs,cs*1.4,0,0,Math.PI*2);ctx.fill();
    drawEye(ctx,x-s*.2,y-s*.1+b,s*.22);drawEye(ctx,x+s*.2,y-s*.1+b,s*.22);
    drawBlush(ctx,x-s*.4,y+s*.15+b,s*.18);drawBlush(ctx,x+s*.4,y+s*.15+b,s*.18);
    drawMouth(ctx,x,y+s*.2+b,s*.08);
    const fn=e?1.2:.9;
    ctx.fillStyle=e?'#74b9ff':'#81ecec';ctx.strokeStyle=e?'#0984e3':'#00b894';ctx.lineWidth=1.5;
    for(let side of[-1,1]){const fx=x+side*s*.85,fy=y+b;ctx.beginPath();ctx.moveTo(fx,fy-fn*s*.3);ctx.quadraticCurveTo(fx+side*fn*s*.3,fy,fx,fy+fn*s*.3);ctx.fill();ctx.stroke();}
    leg(x-s*.3,y+s*.75+b,e?'#0a6eb8':'#00a87e',s*.2,s*.15);leg(x+s*.3,y+s*.75+b,e?'#0a6eb8':'#00a87e',s*.2,s*.15);
  }else if(type==='grass'||type==='grass2'){
    const e=type==='grass2';
    body(e?'#55efc4':'#a8e6cf',e?'#00b894':'#00cec9',s*.85,e?s*1.05:s*.95);
    const cy2=y-s*.8+b;
    ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,cy2+s*.2);ctx.lineTo(x,cy2);ctx.stroke();
    const g2=ctx.createRadialGradient(x,cy2,0,x,cy2,s*.3);g2.addColorStop(0,'#55efc4');g2.addColorStop(1,'#00b894');
    ctx.fillStyle=g2;ctx.beginPath();ctx.ellipse(x,cy2-s*.15,s*.15,s*.35,-.2,0,Math.PI*2);ctx.fill();
    if(e){for(let i=0;i<5;i++){const a=i*1.256;ctx.fillStyle=['#fd79a8','#e84393','#fdcb6e','#e17055','#a29bfe'][i];ctx.beginPath();ctx.ellipse(x+Math.cos(a)*s*.2,cy2-s*.3+Math.sin(a)*s*.2,s*.1,s*.15,a,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#ffeaa7';ctx.beginPath();ctx.arc(x,cy2-s*.3,s*.08,0,Math.PI*2);ctx.fill();}
    drawEye(ctx,x-s*.2,y-s*.1+b,s*.22);drawEye(ctx,x+s*.2,y-s*.1+b,s*.22);
    drawBlush(ctx,x-s*.4,y+s*.15+b,s*.15);drawBlush(ctx,x+s*.4,y+s*.15+b,s*.15);
    drawMouth(ctx,x,y+s*.2+b,s*.08);
    ctx.fillStyle=e?'#55efc4':'#81ecec';
    ctx.beginPath();ctx.ellipse(x-s*.7,y+s*.1+b,s*.12,s*.2,-.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+s*.7,y+s*.1+b,s*.12,s*.2,.3,0,Math.PI*2);ctx.fill();
    leg(x-s*.3,y+s*.75+b,e?'#00a87e':'#00a89e',s*.2,s*.15);leg(x+s*.3,y+s*.75+b,e?'#00a87e':'#00a89e',s*.2,s*.15);
  }else if(type==='bird'){
    body('#d4a373','#a0785a',s*.8,s*.85);
    ctx.fillStyle='#faedcd';ctx.beginPath();ctx.ellipse(x,y+b+s*.1,s*.45,s*.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e67e22';ctx.beginPath();ctx.moveTo(x+s*.4,y-s*.2+b);ctx.lineTo(x+s*.7,y+b);ctx.lineTo(x+s*.4,y+s*.18+b);ctx.closePath();ctx.fill();
    drawEye(ctx,x+s*.05,y-s*.25+b,s*.18);drawEye(ctx,x+s*.25,y-s*.18+b,s*.15);
    drawBlush(ctx,x-s*.1,y+s*.05+b,s*.12);
    ctx.fillStyle='#b8956a';ctx.beginPath();ctx.ellipse(x-s*.7,y+b,s*.2,s*.35,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+s*.55,y+s*.05+b,s*.18,s*.32,-.3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#e67e22';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x-s*.2,y+s*.75+b);ctx.lineTo(x-s*.25,y+s*.95+b);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+s*.2,y+s*.75+b);ctx.lineTo(x+s*.25,y+s*.95+b);ctx.stroke();
  }else if(type==='bat'){
    body('#6c5ce7','#4a3cb5',s*.85,s*.85);

let cv, cx, bv, bx, ts=24;

function resize(){
  const app=document.getElementById('app'), w=app.clientWidth||window.innerWidth;
  const ch=app.clientHeight-90;
  const c=document.getElementById('gameCanvas');
  c.width=Math.min(w,480);
  c.height=Math.max(ch,200);
  ts=Math.floor(c.width/16);
  
  const b=document.getElementById('battleCanvas');
  const bh=app.clientHeight-215;
  b.width=Math.min(w,480);
  b.height=Math.max(bh,140);

}

// ===== MAP RENDER =====
const TC={0:'#5a8f3c',1:'#c8b078',2:'#2d5a1e',3:'#3a7bc8',4:'#8a7a5a',5:'#6a5a3a',6:'#8a7a4a'};
const decos=[]; for(let i=0;i<60;i++) decos.push({x:Math.random()*MC*24,y:Math.random()*MR*24,s:2+Math.random()*4,c:['#e74c3c','#f39c12','#9b59b6','#fff'][~~(Math.random()*4)],t:'f'});

function drawMap(){
  const w=cv.width,h=cv.height,ox=w/2,oy=h/2;
  cx.clearRect(0,0,w,h);
  // Sky gradient - visible at edges
  const grd=cx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,'#4a90d9');grd.addColorStop(.5,'#3a7bc8');grd.addColorStop(1,'#5a8f3c');
  cx.fillStyle=grd;cx.fillRect(0,0,w,h);
  
  for(let r=0;r<MR;r++) for(let c=0;c<MC;c++){
    const t=MAP[r][c];
    const sx=c*ts-G.px*ts+ox, sy=r*ts-G.py*ts+oy;
    if(sx+ts<-ts||sx>w+ts||sy+ts<-ts||sy>h+ts) continue;
    
    // Base tile
    if(t===0){ // Grass with variation
      const v=(r*7+c*13)%5;
      if(v<2){cx.fillStyle='#5a8f3c';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#4a7f2c';}
      else if(v<4){cx.fillStyle='#4a7f2c';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#5a8f3c';}
      else{cx.fillStyle='#6a9f4c';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#5a8f3c';}
      cx.fillRect(sx,sy,ts,2);cx.fillRect(sx,sy+ts-2,ts,2);
      cx.fillRect(sx,sy,2,ts);cx.fillRect(sx+ts-2,sy,2,ts);
      // Flowers
      if((r*7+c*13)%7===0){
        cx.fillStyle=['#e74c3c','#f39c12','#9b59b6','#fff'][(r+c)%4];
        cx.beginPath();cx.arc(sx+4+Math.sin(r)*4,sy+4+Math.cos(c)*4,2,0,Math.PI*2);cx.fill();
      }
    }else if(t===1){
      cx.fillStyle='#c8b078';cx.fillRect(sx,sy,ts,ts);
      cx.fillStyle='#b8a068';cx.fillRect(sx,sy,ts,1);cx.fillRect(sx,sy,1,ts);
    }else if(t===2){ // Tree
      cx.fillStyle='#2d5a1e';cx.fillRect(sx,sy,ts,ts);
      cx.fillStyle='#1d4a0e';cx.beginPath();
      cx.arc(sx+ts/2,sy+ts/2-3,ts/2.2,0,Math.PI*2);cx.fill();
      cx.fillStyle='#3a7a2a';
      cx.beginPath();cx.arc(sx+ts/2-5,sy+ts/2-6,ts/3,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(0,0,0,.1)';cx.beginPath();
      cx.ellipse(sx+ts/2+3,sy+ts-2,ts/2.2,3,0,0,Math.PI*2);cx.fill();
    }else if(t===3){ // Water
      cx.fillStyle='#3a7bc8';cx.fillRect(sx,sy,ts,ts);
      cx.fillStyle='rgba(255,255,255,.06)';
      cx.fillRect(sx+4,sy+ts/2-1+Math.sin(G.time*0.03+r)*2,ts-8,2);
      cx.fillStyle='rgba(255,255,255,.04)';
      cx.fillRect(sx+2,sy+ts/3-1+Math.sin(G.time*0.04+c)*2,ts-4,1);
    }else if(t===4){ // Fence
      cx.fillStyle='#8a7a5a';cx.fillRect(sx,sy,ts,ts);
      cx.fillStyle='#7a6a4a';cx.fillRect(sx+2,sy,ts-4,2);cx.fillRect(sx+2,sy+ts-2,ts-4,2);
      for(let i=0;i<4;i++) cx.fillRect(sx+4+i*5,sy+2,2,ts-4);
    }else if(t===5){ // House wall
      cx.fillStyle='#7a6a4a';cx.fillRect(sx,sy,ts,ts);
      cx.strokeStyle='#5a4a2a';cx.lineWidth=1;cx.strokeRect(sx,sy,ts,ts);
      // Roof overhang
      cx.fillStyle='#5a3a1a';cx.fillRect(sx-2,sy-4,ts+4,4);
    }else if(t===6){ // Door
      cx.fillStyle='#5a3a2a';cx.fillRect(sx,sy,ts,ts);
      cx.fillStyle='#7a5a3a';cx.fillRect(sx+4,sy+4,ts-8,ts-4);
      cx.fillStyle='#f5d76e';cx.fillRect(sx+ts-10,sy+ts/2-2,3,3); // doorknob
    }
  }
  
  // Draw player
  drawPlayer(ox,oy);
  // Draw name badge
  if(G.pets.length){
    cx.fillStyle='rgba(0,0,0,.5)';const bw=100,bh=18;
    cx.beginPath();cx.roundRect(ox-50,oy-ts*1.5,bw,bh,8);cx.fill();
    cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';
    cx.fillText(G.pets[G.idx].name+' Lv.'+G.pets[G.idx].lv,ox,oy-ts*1.5+13);
  }
}

function drawPlayer(ox,oy){
  const px=ox, py=oy, s=ts, bob=Math.sin(G.time*0.1)*1.5;
  
  // Shadow
  cx.fillStyle='rgba(0,0,0,.15)';
  cx.beginPath();cx.ellipse(px,py+s-4,s/3,3,0,0,Math.PI*2);cx.fill();
  
  // Body
  cx.fillStyle='#4a7ae8';cx.fillRect(px-s/3,py-s/4+bob,s/1.5,s/2.2);
  // Legs
  cx.fillStyle='#3a5ab8';cx.fillRect(px-s/4,py+s/4+bob,s/5,s/3);
  cx.fillRect(px+s/10,py+s/4+bob,s/5,s/3);
  // Head
  cx.fillStyle='#f0c8a0';cx.beginPath();
  cx.arc(px,py-s/2+bob,s/4.5,0,Math.PI*2);cx.fill();
  // Hat
  cx.fillStyle='#e74c3c';cx.fillRect(px-s/4,py-s/1.8+bob-2,s/2,s/7);
  cx.fillRect(px-s/5,py-s/2.5+bob-4,s/2.5,s/6);
  // Eyes
  const ed=G.time%300<150?0:1;
  cx.fillStyle='#222';
  if(ed===0){cx.fillRect(px-5,py-s/2-2+bob,3,3);cx.fillRect(px+2,py-s/2-2+bob,3,3);}
  else{cx.lineWidth=1.5;cx.beginPath();cx.moveTo(px-7,py-s/2-1+bob);cx.lineTo(px-3,py-s/2-1+bob);cx.stroke();
    cx.beginPath();cx.moveTo(px,py-s/2-1+bob);cx.lineTo(px+4,py-s/2-1+bob);cx.stroke();}
  // Mouth
  cx.fillStyle='#c0392b';cx.beginPath();cx.arc(px,py-s/2.5+bob,2,0,Math.PI);cx.fill();
}

// ===== MOVEMENT =====
let mc=false;
function movePlayer(dx,dy){
  if(G.battle||mc) return;
  const nx=G.px+dx, ny=G.py+dy;
  if(nx<0||nx>=MC||ny<0||ny>=MR) return;
  const t=MAP[ny][nx];
  if(t===2||t===3||t===4||t===5) return;
  G.px=nx; G.py=ny; G.step++;
  mc=true; setTimeout(()=>{mc=false;},140);
  if(t===0&&!G.battle){
    const r=G.step%8===0?0.2:G.step%5===0?0.15:0.1;
    if(Math.random()<r){startBattle();return;}
  }
  drawMap();
}
document.addEventListener('keydown',e=>{
  if(G.battle) return;
  if(e.key.startsWith('Arrow')){e.preventDefault();
    ({ArrowUp:()=>movePlayer(0,-1),ArrowDown:()=>movePlayer(0,1),
      ArrowLeft:()=>movePlayer(-1,0),ArrowRight:()=>movePlayer(1,0)})[e.key]();}});

// ===== BATTLE =====
function startBattle(){
  G.battle=true; G.bs='msg';
  const wdb=WILD_DB.filter(w=>!w.rare||Math.random()<.25);
  const w=wdb[~~(Math.random()*wdb.length)];
  const p=G.pets[G.idx];
  const lv=Math.max(1,p.lv-3+~~(Math.random()*5));
  const lm=1+(lv-1)*.12;
  G.wild={...w,lv,maxHp:~~(w.hp*lm),hp:~~(w.hp*lm),atk:~~(w.atk*lm),def:~~(w.def*lm)};
  document.getElementById('overworld').style.display='none';
  document.getElementById('battle').style.display='flex';
  resize();
  showBtlUI();
  btlMsg(`野生 ${G.wild.emoji||'?'} ${G.wild.name} 出現咗！`);
}

function showBtlUI(){
  const p=G.pets[G.idx], w=G.wild;
  document.getElementById('myPN').textContent=p.name;
  document.getElementById('myPL').textContent='Lv.'+p.lv;
  const mp=p.hp/p.maxHp*100;
  document.getElementById('myBar').style.width=mp+'%';
  document.getElementById('myBar').className='bar-fill '+(mp<25?'red':mp<50?'yellow':'green');
  document.getElementById('myNum').textContent=Math.ceil(p.hp)+'/'+p.maxHp;
  
  document.getElementById('enPN').textContent=w.emoji+' '+w.name;
  document.getElementById('enPL').textContent='Lv.'+w.lv;
  const ep=w.hp/w.maxHp*100;
  document.getElementById('enBar').style.width=ep+'%';
  document.getElementById('enBar').className='bar-fill '+(ep<25?'red':ep<50?'yellow':'green');
  document.getElementById('enNum').textContent=Math.ceil(w.hp)+'/'+w.maxHp;
  
  document.getElementById('btlActs').innerHTML=`
    <div class="act-btn primary" onclick="bFight()">⚔️ 攻擊</div>
    <div class="act-btn success" onclick="bCatch()">⚡ 捕捉</div>
    <div class="act-btn danger" onclick="bRun()">🏃 逃走</div>
    <div class="act-btn" onclick="bBag()">🎒 寵物</div>`;
}

function btlMsg(m){document.getElementById('btlMsg').textContent=m;}

function bFight(){
  if(G.bs==='msg') return; G.bs='msg';
  const p=G.pets[G.idx], w=G.wild;
  let mult=1;
  if(TYPE[p.el]&&TYPE[p.el][w.el]) mult=TYPE[p.el][w.el];
  const dmg=Math.max(1,~~(p.atk*12/w.def*(.85+Math.random()*.3)*mult));
  w.hp=Math.max(0,w.hp-dmg);
  
  let m=`${p.name} 攻擊！-${dmg}HP`;
  if(mult>1.5) m+='\n💥 效果絕佳！';
  else if(mult<.8) m+='\n💨 效果不佳...';
  btlMsg(m); showBtlUI();
  
  if(w.hp<=0){setTimeout(bWin,700);return;}
  setTimeout(enemyTurn,900);
}

function enemyTurn(){
  const p=G.pets[G.idx], w=G.wild;
  let mult=1;
  if(TYPE[w.el]&&TYPE[w.el][p.el]) mult=TYPE[w.el][p.el];
  const dmg=Math.max(1,~~(w.atk*10/p.def*(.85+Math.random()*.3)*mult));
  p.hp=Math.max(0,p.hp-dmg);
  
  btlMsg(`野生 ${w.name} 反擊！-${dmg}HP${mult>1.5?'💥':''}`);
  showBtlUI();
  
  if(p.hp<=0){setTimeout(bLose,700);return;}
  G.bs='idle';setTimeout(()=>{btlMsg('輪到你！');showBtlUI();},700);
}

function bWin(){
  const p=G.pets[G.idx], w=G.wild;
  const exp=15+w.lv*3, old=p.lv;
  p.exp=(p.exp||0)+exp;
  const need=p.lv*10;
  let m=`🎉 勝利！+${exp}EXP`;
  
  if(p.exp>=need){
    p.exp-=need; p.lv++;
    p.atk=~~(p.atk*1.1)+1; p.def=~~(p.def*1.08)+1;
    p.maxHp=~~(p.maxHp*1.08)+5; p.hp=p.maxHp;
    m+=`\n🌟 ${p.name} 升到 Lv.${p.lv}！`;
    const lv=document.getElementById('lvupT');
    lv.textContent=`🌟 ${p.name}\nLv.${p.lv}!`;
    document.getElementById('lvupO').style.display='flex';
    setTimeout(()=>{document.getElementById('lvupO').style.display='none';},1200);
    // Evolve check
    if(p.evLv&&p.lv>=p.evLv&&!p.evolved){
      setTimeout(()=>{doEvolve(p);},1400);
    }
  }
  btlMsg(m);
  setTimeout(endBattle,1800);
}

function doEvolve(p){
  const ev=EVO[p.id];
  if(!ev||p.evolved) return;
  const eo=document.getElementById('evoO');
  document.getElementById('evoT').textContent=p.name;
  document.getElementById('evoSub').textContent=`進化 → ${ev.name}！`;
  eo.style.display='flex';
  setTimeout(()=>{
    p.name=ev.name; p.id=ev.to; p.el=ev.el;
    p.maxHp=ev.hp; p.hp=ev.hp; p.atk=ev.atk; p.def=ev.def;
    p.evolved=true;
    eo.style.display='none';
    showBtlUI();
    btlMsg(`🌟 ${p.name} 進化完成！`);
  },2500);
}

function bLose(){
  btlMsg(`💀 失去戰鬥能力...`);
  document.getElementById('btlActs').innerHTML=
    `<div class="act-btn primary" onclick="endBattleLose()" style="grid-column:1/3">返回起點</div>`;
}

function endBattleLose(){
  G.pets.forEach(p=>p.hp=p.maxHp);
  G.px=10;G.py=8;
  endBattle();
}

function bCatch(){
  if(G.bs==='msg') return; G.bs='msg';
  const w=G.wild;
  if(G.pets.length>=6){btlMsg('隊伍已滿！');G.bs='idle';setTimeout(showBtlUI,800);return;}
  const r=.25+(1-w.hp/w.maxHp)*.5-(w.rare?.3:0);
  if(Math.random()<r){
    G.pets.push({id:w.id+'_'+Date.now(),name:w.name,el:w.el,emoji:w.emoji,h:[[0,1,2,3,3,2,1,0],[1,2,0,0,0,0,2,1],[2,0,4,4,4,4,0,2],[2,0,4,4,4,4,0,2],[2,0,4,4,4,4,0,2],[1,0,4,4,4,4,0,1],[1,0,4,4,4,4,0,1],[0,1,2,2,2,2,1,0]],
      lv:w.lv,maxHp:w.maxHp,hp:w.maxHp,atk:w.atk,def:w.def,exp:0,evLv:null,evolved:false,id2:w.spr});
    btlMsg(`🎉 成功捕捉 ${w.name}！`);
    setTimeout(endBattle,1200);
  }else{
    btlMsg(`${w.name} 掙脫了！`);
    G.bs='msg';
    setTimeout(enemyTurn,800);
  }
}

function bRun(){
  if(G.bs==='msg') return; G.bs='msg';
  if(Math.random()<.55){btlMsg('成功逃走！💨');setTimeout(endBattle,700);}
  else{btlMsg('逃唔到！😰');setTimeout(enemyTurn,700);}
}

function bBag(){
  const bm=document.getElementById('bagModal');
  const bl=document.getElementById('bagList');
  const p=G.pets;
  if(!p.length){bl.innerHTML='<div style="color:#666;padding:16px;text-align:center">暫冇寵物</div>';}
  else{
    bl.innerHTML=p.map((x,i)=>{
      const a=i===G.idx;
      return `<div class="bag-item${a?' active':''}" onclick="${!a&&x.hp>0?`switchBtl(${i})`:''}">
        <canvas class="s" id="is_${i}" width="16" height="12"></canvas>
        <div class="info"><div class="n">${x.name}${a?' ⭐':''}</div>
        <div class="d">Lv.${x.lv} | HP:${Math.ceil(x.hp)}/${x.maxHp}</div></div>
        <span class="tag">${x.el}</span>
      </div>`;
    }).join('');
    p.forEach((x,i)=>{
      const c=document.getElementById('is_'+i);
      if(c) drawCreature(c.getContext('2d'),x.id2||x.id||'fire',0,0,16);
    });
  }
  bm.style.display='flex';
}

function switchBtl(i){
  G.idx=i; G.bs='idle';
  document.getElementById('bagModal').style.display='none';
  const p=G.pets[i];
  btlMsg(`換出 ${p.name}！`);
  showBtlUI();drawBtlScene();
  setTimeout(showBtlUI,700);
}

function endBattle(){
  G.battle=false;
  document.getElementById('battle').style.display='none';
  document.getElementById('overworld').style.display='flex';
  resize();drawMap();
}

// ===== BATTLE CANVAS =====
function drawBtlScene(){
  const w=bv.width,h=bv.height;
  bx.clearRect(0,0,w,h);
  
  // Sky
  const sg=bx.createLinearGradient(0,0,0,h);
  sg.addColorStop(0,'#3a6bca');sg.addColorStop(.4,'#5a8a6a');sg.addColorStop(1,'#3a6b3a');
  bx.fillStyle=sg;bx.fillRect(0,0,w,h);
  
  // Clouds
  bx.fillStyle='rgba(255,255,255,.08)';
  for(let i=0;i<4;i++){
    const cx_=w*(.1+.2*i)+Math.sin(G.time*.005+i)*20;
    bx.beginPath();bx.ellipse(cx_,h*.15+Math.sin(i*3)*8,50+Math.sin(i*5)*15,16,0,0,Math.PI*2);bx.fill();
  }
  
  // Ground
  bx.fillStyle='#4a7c3a';bx.fillRect(0,h-50,w,50);
  bx.fillStyle='#3a6c2a';bx.fillRect(0,h-53,w,4);
  for(let i=0;i<w;i+=6){
    bx.fillStyle=['#5a8f3c','#4a7c3a','#6a9f4c'][i%3];
    bx.fillRect(i,h-50-5+Math.sin(i*.2+G.time*.02)*3,3,5+Math.sin(i*.1)*2);
  }
  
  // Wild pet
  if(G.wild){
    const wps=50+Math.sin(G.time*.03)*3;
    const sid=G.wild.spr||G.wild.id||'bird';
    drawCreature(bx,sid,w*.72-25,h-75-15,50,G.time);
    // Name tag
    bx.fillStyle='rgba(0,0,0,.6)';bx.beginPath();bx.roundRect(w*.72-25,h-105,50,18,6);bx.fill();
    bx.fillStyle='#fff';bx.font='bold 10px sans-serif';bx.textAlign='center';
    bx.fillText(G.wild.name,w*.72,h-92);
    // HP bar under wild
    const hpR=G.wild.hp/G.wild.maxHp;
    bx.fillStyle='rgba(0,0,0,.4)';bx.beginPath();bx.roundRect(w*.72-25,h-82,50,5,3);bx.fill();
    bx.fillStyle=hpR<.25?'#ff3b30':hpR<.5?'#ff9500':'#4cd964';
    bx.beginPath();bx.roundRect(w*.72-25,h-82,50*hpR,5,3);bx.fill();
  }
  
  // Player pet
  if(G.pets.length){
    const p=G.pets[G.idx];
    const ps=40+Math.sin(G.time*.04+2)*2;
    drawCreature(bx,p.id2||p.id||'fire',w*.28-20,h-70-10,40,G.time+50);
    bx.fillStyle='rgba(0,0,0,.6)';bx.beginPath();bx.roundRect(w*.28-20,h-95,40,18,6);bx.fill();
    bx.fillStyle='#fff';bx.font='bold 10px sans-serif';bx.textAlign='center';
    bx.fillText(p.name,w*.28,h-82);
    // HP bar
    const hpR2=p.hp/p.maxHp;
    bx.fillStyle='rgba(0,0,0,.4)';bx.beginPath();bx.roundRect(w*.28-20,h-72,40,5,3);bx.fill();
    bx.fillStyle=hpR2<.25?'#ff3b30':hpR2<.5?'#ff9500':'#4cd964';
    bx.beginPath();bx.roundRect(w*.28-20,h-72,40*hpR2,5,3);bx.fill();
  }
}

// ===== STARTER SELECT =====
function initTitle(){
  const sp=document.getElementById('starterPick');
  sp.innerHTML=STARTERS.map((s,i)=>`
    <div class="starter-card" onclick="pickSt(${i})">
      <div class="sprite-box"><canvas id="st_${i}" width="32" height="24"></canvas></div>
      <div class="name">${s.name}</div>
      <div class="element">${s.elCN}</div>
    </div>`).join('');
  STARTERS.forEach((s,i)=>{
    const c=document.getElementById('st_'+i);
    if(c) drawCreature(c.getContext('2d'),s.id,0,0,32);
  });
  // Stars
  const bg=document.getElementById('starBG');
  for(let i=0;i<30;i++){
    const s=document.createElement('div');
    s.className='title-star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*60+'%';
    s.style.animationDelay=Math.random()*3+'s';
    s.style.width=s.style.height=1+Math.random()*2+'px';
    bg.appendChild(s);
  }
  setTimeout(()=>drawBtlScene(),100);
}

function pickSt(i){
  G.sel=i;
  document.querySelectorAll('.starter-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
  document.getElementById('startBtn').disabled=false;
}

function startGame(){
  const s=STARTERS[G.sel];
  const ev=EVO[s.id];
  G.pets=[{id:s.id,name:s.name,el:s.el,emoji:s.el==='Fire'?'🔥':s.el==='Water'?'💧':'🌿',
    lv:1,maxHp:120,hp:120,atk:15,def:10,exp:0,evLv:16,evolved:false,id2:s.id}];
  G.idx=0;
  document.getElementById('title').style.display='none';
  document.getElementById('overworld').style.display='flex';
  resize();drawMap();
  document.getElementById('partnerBadge').textContent=G.pets[0].name+' Lv.1';
  setTimeout(()=>{
    showModal('🎮 開始冒險！',
      `你揀咗 ${G.pets[0].name} 做夥伴！\n\n行草叢會遇到野生寵物→打羸升呢\n打傷咗可以捕捉→最多帶6隻\nLv.16會進化！\n\n加油訓練員！🌟`);
  },500);
}

// ===== UTILS =====
function showModal(t,x){
  document.getElementById('modalT').textContent=t;
  document.getElementById('modalX').textContent=x;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function showBag(){
  if(G.battle) return;
  const bm=document.getElementById('bagModal');
  const bl=document.getElementById('bagList');
  if(!G.pets.length){bl.innerHTML='<div style="color:#666;padding:16px;text-align:center">暫冇寵物</div>';}
  else{
    bl.innerHTML=G.pets.map((x,i)=>{
      const a=i===G.idx;
      return `<div class="bag-item${a?' active':''}" onclick="${!a&&x.hp>0?`switchPet(${i})`:''}">
        <canvas class="s" id="bs_${i}" width="16" height="12"></canvas>
        <div class="info"><div class="n">${x.name}${a?' ⭐':''}</div>
        <div class="d">Lv.${x.lv} | HP:${Math.ceil(x.hp)}/${x.maxHp}</div></div>
        <span class="tag">${x.el}</span>
      </div>`;
    }).join('');
    G.pets.forEach((x,i)=>{
      const c=document.getElementById('bs_'+i);
      if(c) drawCreature(c.getContext('2d'),x.id2||x.id||'fire',0,0,16);
    });
  }
  bm.style.display='flex';
}
window.showBag=showBag;
window.switchPet=function(i){G.idx=i;document.getElementById('bagModal').style.display='none';showBag();};

// Canvas roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(r>w/2)r=w/2;if(r>h/2)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);return this;
  };
}

// ===== GAME LOOP =====
function loop(){
  G.time++;
  if(G.battle) drawBtlScene();
  requestAnimationFrame(loop);
}

window.onload=()=>{cv=document.getElementById('gameCanvas');cx=cv.getContext('2d');
  bv=document.getElementById('battleCanvas');bx=bv.getContext('2d');
  resize();window.addEventListener('resize',resize);initTitle();loop();};
</script>
