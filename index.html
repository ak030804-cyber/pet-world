<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>寵物樂園</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'PingFang TC','Segoe UI',sans-serif;background:#0a0a1a;color:#fff}
#app{width:100%;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;position:relative}
#title{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a0a1a,#1a0a2e,#16213e)}
#title h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,#f5d76e,#ff9500,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#title .sub{color:rgba(255,255,255,.25);font-size:11px;letter-spacing:6px;margin-bottom:32px}
.pick{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:360px}
.card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);border-radius:18px;padding:16px 6px 12px;text-align:center;width:90px;cursor:pointer;transition:all .25s}
.card.sel{border-color:rgba(245,215,110,.3);background:rgba(245,215,110,.04);transform:translateY(-4px);box-shadow:0 8px 20px rgba(245,215,110,.08)}
.card .pm{width:56px;height:56px;margin:0 auto 6px;position:relative}
.card .pm .pet{transform:scale(.5);transform-origin:top left;width:100px;height:120px}
.card .pn{font-size:12px;font-weight:600}
.go{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:14px;color:#0a0a1a;font-size:17px;font-weight:700;padding:15px 48px;margin-top:28px;cursor:pointer;box-shadow:0 4px 0 #b87200;transition:all .1s}
.go:disabled{opacity:.25;box-shadow:none!important;pointer-events:none}
.go:active{transform:translateY(4px);box-shadow:0 1px 0 #b87200}
#game{display:none;flex-direction:column;height:100%;background:linear-gradient(180deg,#0a0a1a,#16213e,#1a2a5a)}
#header{display:flex;align-items:center;padding:10px 16px 2px;gap:8px}
#header .pn{font-size:17px;font-weight:700}#header .lv{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);padding:2px 10px;border-radius:8px}
#header .xp{font-size:10px;color:rgba(255,255,255,.25);margin-left:auto}#header .coin{font-size:13px;font-weight:600;color:#f5d76e;background:rgba(245,215,110,.06);padding:2px 10px;border-radius:8px}

/* Pet Display */
#petArea{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#petArea::before{content:'';position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(245,215,110,.03),transparent 60%)}
#petArt{position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center}
#petArt .pet{transform:scale(1.2);transform-origin:center center}
#petArt .shadow{width:80px;height:12px;background:rgba(0,0,0,.12);border-radius:50%;margin-top:-10px}
#petMood{position:absolute;top:20%;font-size:30px;animation:float 2s ease-in-out infinite;z-index:5}

/* CSS Pets */
.pet{position:relative;width:100px;height:120px;margin:0 auto}
.pet .body{position:absolute;left:50%;top:35px;transform:translateX(-50%)}
/* Fire pet */
.pet-0 .body{width:56px;height:56px;background:radial-gradient(circle at 38% 35%,#ff6b35,#d63031);border-radius:50%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.15),inset 3px 3px 12px rgba(255,150,50,.4)}
.pet-0 .eye{position:absolute;top:16px;width:10px;height:12px;background:#222;border-radius:50%;z-index:2}
.pet-0 .eye::after{content:'';position:absolute;top:0;left:1px;width:5px;height:5px;background:#fff;border-radius:50%}
.pet-0 .eye-l{left:8px}.pet-0 .eye-r{right:8px}
.pet-0 .bl{position:absolute;top:24px;width:10px;height:5px;background:rgba(255,100,100,.25);border-radius:50%}.pet-0 .bl-l{left:1px}.pet-0 .bl-r{right:1px}
.pet-0 .mo{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:10px;height:5px;border-bottom:2px solid rgba(0,0,0,.2);border-radius:0 0 10px 10px}
.pet-0 .fl{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:32px;height:24px;background:radial-gradient(circle at 50% 60%,#ffd93d,#ff9500 40%,#d63031 75%);border-radius:50% 50% 30% 30%;animation:fk 1.2s infinite}
.pet-0 .fl::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:16px;height:12px;background:radial-gradient(circle at 50% 30%,#fff,#ffd93d);border-radius:50% 50% 40% 40%}
.pet-0 .lg{position:absolute;bottom:0;width:14px;height:14px;border-radius:50%}.pet-0 .lg-l{left:10px;background:radial-gradient(ellipse at 50% 30%,#ff6b35,#c0392b)}.pet-0 .lg-r{right:10px;background:radial-gradient(ellipse at 50% 30%,#ff6b35,#c0392b)}
.pet-0 .tl{position:absolute;right:-16px;top:30px;width:20px;height:8px;background:linear-gradient(90deg,#ff9500,#d63031);border-radius:0 50% 50% 0;animation:wg 1.5s infinite;transform-origin:left center}
/* Water pet */
.pet-1 .body{width:58px;height:50px;background:radial-gradient(circle at 38% 35%,#81ecec,#0984e3);border-radius:50% 50% 45% 45%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.1),inset 3px 3px 12px rgba(129,236,236,.3)}
.pet-1 .eye{position:absolute;top:14px;width:10px;height:12px;background:#222;border-radius:50%;z-index:2}
.pet-1 .eye::after{content:'';position:absolute;top:0;left:1px;width:5px;height:5px;background:#fff;border-radius:50%}
.pet-1 .eye-l{left:10px}.pet-1 .eye-r{right:10px}
.pet-1 .bl{position:absolute;top:22px;width:10px;height:5px;background:rgba(255,100,100,.2);border-radius:50%}.pet-1 .bl-l{left:3px}.pet-1 .bl-r{right:3px}
.pet-1 .mo{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:8px;height:4px;border-bottom:2px solid rgba(0,0,0,.15);border-radius:0 0 8px 8px}
.pet-1 .dp{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:20px;height:20px;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.4),#81ecec 40%,#00b894);border-radius:50% 0 50% 50%;animation:ft 2.5s infinite}
.pet-1 .lg{position:absolute;bottom:2px;width:14px;height:12px;border-radius:50%}.pet-1 .lg-l{left:12px;background:radial-gradient(ellipse at 50% 40%,#81ecec,#0984e3)}.pet-1 .lg-r{right:12px;background:radial-gradient(ellipse at 50% 40%,#81ecec,#0984e3)}
.pet-1 .bb{position:absolute;left:-10px;top:15px;width:8px;height:8px;background:rgba(129,236,236,.2);border-radius:50%;animation:bb 3s infinite}
.pet-1 .b2{position:absolute;left:-6px;top:8px;width:5px;height:5px;background:rgba(129,236,236,.15);border-radius:50%;animation:bb 2.5s .5s infinite}
/* Grass pet */
.pet-2 .body{width:56px;height:52px;background:radial-gradient(circle at 38% 35%,#55efc4,#00b894);border-radius:50% 50% 40% 40%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.1),inset 3px 3px 12px rgba(85,239,196,.3)}
.pet-2 .eye{position:absolute;top:14px;width:10px;height:11px;background:#222;border-radius:50%;z-index:2}
.pet-2 .eye::after{content:'';position:absolute;top:0;left:1px;width:5px;height:5px;background:#fff;border-radius:50%}
.pet-2 .eye-l{left:10px}.pet-2 .eye-r{right:10px}
.pet-2 .bl{position:absolute;top:22px;width:10px;height:5px;background:rgba(255,100,100,.2);border-radius:50%}.pet-2 .bl-l{left:2px}.pet-2 .bl-r{right:2px}
.pet-2 .mo{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:9px;height:4px;border-bottom:2px solid rgba(0,0,0,.12);border-radius:0 0 10px 10px}
.pet-2 .lf{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:14px;height:22px;background:radial-gradient(ellipse at 50% 30%,#55efc4,#00b894);border-radius:50% 50% 20% 20%;transform-origin:bottom center;animation:sw 2s infinite}
.pet-2 .lf::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:6px;height:12px;background:radial-gradient(ellipse at 50% 20%,rgba(255,255,255,.3),transparent);border-radius:50% 50% 20% 20%}
.pet-2 .ea{position:absolute;top:-6px;width:18px;height:16px;background:radial-gradient(ellipse at 50% 40%,#55efc4,#00b894);border-radius:50% 50% 30% 30%}.pet-2 .ea-l{left:8px;transform:rotate(-15deg)}.pet-2 .ea-r{right:8px;transform:rotate(15deg)}
.pet-2 .lg{position:absolute;bottom:0;width:14px;height:12px;border-radius:50%}.pet-2 .lg-l{left:12px;background:radial-gradient(ellipse at 50% 40%,#55efc4,#00a87e)}.pet-2 .lg-r{right:12px;background:radial-gradient(ellipse at 50% 40%,#55efc4,#00a87e)}
/* Dog pet */
.pet-3 .body{width:60px;height:50px;background:radial-gradient(circle at 40% 35%,#fdcb6e,#e17055);border-radius:45% 45% 40% 40%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.1),inset 3px 3px 8px rgba(253,203,110,.2)}
.pet-3 .eye{position:absolute;top:14px;width:10px;height:11px;background:#222;border-radius:50%;z-index:2}
.pet-3 .eye::after{content:'';position:absolute;top:0;left:1px;width:5px;height:5px;background:#fff;border-radius:50%}
.pet-3 .eye-l{left:11px}.pet-3 .eye-r{right:11px}
.pet-3 .bl{position:absolute;top:21px;width:12px;height:5px;background:rgba(255,100,100,.2);border-radius:50%}.pet-3 .bl-l{left:2px}.pet-3 .bl-r{right:2px}
.pet-3 .mo{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:14px;height:6px;border-bottom:2px solid rgba(0,0,0,.15);border-radius:0 0 12px 12px}
.pet-3 .ea{position:absolute;top:-8px;width:20px;height:20px;background:radial-gradient(ellipse at 50% 40%,#fdcb6e,#d63031);border-radius:50% 50% 20% 20%}.pet-3 .ea-l{left:6px;transform:rotate(-20deg)}.pet-3 .ea-r{right:6px;transform:rotate(20deg)}
.pet-3 .lg{position:absolute;bottom:0;width:14px;height:14px;border-radius:50%}.pet-3 .lg-l{left:10px;background:radial-gradient(ellipse at 50% 30%,#fdcb6e,#e17055)}.pet-3 .lg-r{right:10px;background:radial-gradient(ellipse at 50% 30%,#fdcb6e,#e17055)}
.pet-3 .tl{position:absolute;right:-18px;top:22px;width:20px;height:7px;background:linear-gradient(90deg,#e17055,#fdcb6e);border-radius:0 50% 50% 0;animation:wg 1.2s infinite;transform-origin:left center}
/* Bunny pet */
.pet-4 .body{width:52px;height:48px;background:radial-gradient(circle at 38% 35%,#fd79a8,#e84393);border-radius:50% 50% 45% 45%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.1),inset 3px 3px 10px rgba(253,121,168,.2)}
.pet-4 .eye{position:absolute;top:13px;width:11px;height:12px;background:#222;border-radius:50%;z-index:2}
.pet-4 .eye::after{content:'';position:absolute;top:0;left:2px;width:5px;height:5px;background:#fff;border-radius:50%}
.pet-4 .eye-l{left:8px}.pet-4 .eye-r{right:8px}
.pet-4 .bl{position:absolute;top:21px;width:12px;height:5px;background:rgba(255,100,100,.22);border-radius:50%}.pet-4 .bl-l{left:0}.pet-4 .bl-r{right:0}
.pet-4 .mo{position:absolute;top:25px;left:50%;transform:translateX(-50%);width:6px;height:4px;border-bottom:2px solid rgba(0,0,0,.12);border-radius:0 0 6px 6px}
.pet-4 .ea{position:absolute;top:-22px;width:12px;height:28px;background:radial-gradient(ellipse at 50% 40%,#fd79a8,#e84393);border-radius:50% 50% 20% 20%;z-index:0}.pet-4 .ea-l{left:12px;transform:rotate(-6deg)}.pet-4 .ea-r{right:12px;transform:rotate(6deg)}
.pet-4 .ea::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:5px;height:15px;background:rgba(255,255,255,.15);border-radius:50%}
.pet-4 .lg{position:absolute;bottom:0;width:16px;height:14px;border-radius:50%}.pet-4 .lg-l{left:8px;background:radial-gradient(ellipse at 50% 40%,#fd79a8,#d6307a)}.pet-4 .lg-r{right:8px;background:radial-gradient(ellipse at 50% 40%,#fd79a8,#d6307a)}
/* Hamster */
.pet-5 .body{width:54px;height:48px;background:radial-gradient(circle at 38% 35%,#f5d76e,#f39c12);border-radius:50% 50% 45% 45%;box-shadow:inset -4px -4px 10px rgba(0,0,0,.1),inset 3px 3px 10px rgba(245,215,110,.2)}
.pet-5 .eye{position:absolute;top:14px;width:10px;height:10px;background:#222;border-radius:50%;z-index:2}
.pet-5 .eye::after{content:'';position:absolute;top:1px;left:2px;width:4px;height:4px;background:#fff;border-radius:50%}
.pet-5 .eye-l{left:10px}.pet-5 .eye-r{right:10px}
.pet-5 .bl{position:absolute;top:20px;width:14px;height:5px;background:rgba(255,100,100,.25);border-radius:50%}.pet-5 .bl-l{left:0}.pet-5 .bl-r{right:0}
.pet-5 .mo{position:absolute;top:25px;left:50%;transform:translateX(-50%);width:8px;height:4px;border-bottom:2px solid rgba(0,0,0,.1);border-radius:0 0 8px 8px}
.pet-5 .ea{position:absolute;top:-4px;width:16px;height:14px;background:radial-gradient(ellipse at 50% 40%,#f5d76e,#f39c12);border-radius:50% 50% 20% 20%}.pet-5 .ea-l{left:8px;transform:rotate(-10deg)}.pet-5 .ea-r{right:8px;transform:rotate(10deg)}
.pet-5 .ea::after{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:6px;height:8px;background:rgba(255,255,255,.12);border-radius:50%}
.pet-5 .ck{position:absolute;bottom:6px;width:16px;height:12px;background:rgba(245,215,110,.15);border-radius:50%}.pet-5 .ck-l{left:2px}.pet-5 .ck-r{right:2px}
.pet-5 .lg{position:absolute;bottom:-2px;width:12px;height:10px;border-radius:50%}.pet-5 .lg-l{left:13px;background:radial-gradient(ellipse at 50% 40%,#f5d76e,#e67e22)}.pet-5 .lg-r{right:13px;background:radial-gradient(ellipse at 50% 40%,#f5d76e,#e67e22)}

@keyframes ft{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
@keyframes fk{0%,100%{transform:translateX(-50%) scaleY(1)}25%{scaleY(1.08) scaleX(.95)}50%{scaleY(.92) scaleX(1.05)}}
@keyframes wg{0%,100%{transform:rotate(0)}50%{transform:rotate(20deg)}}
@keyframes sw{0%,100%{transform:translateX(-50%) rotate(0)}50%{transform:translateX(-50%) rotate(5deg)}}
@keyframes bb{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-15px) translateY(-10px);opacity:0}}

/* Stats */
#stats{padding:0 16px 6px;display:flex;flex-direction:column;gap:3px}
.st{display:flex;align-items:center;gap:5px}.st .ic{font-size:12px;width:16px;text-align:center}.st .lb{font-size:9px;color:rgba(255,255,255,.3);width:22px}
.st .bw{flex:1;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}.st .bf{height:100%;border-radius:2px;transition:width .5s ease}.st .vl{font-size:9px;color:rgba(255,255,255,.2);width:20px;text-align:right}
/* Actions */
#actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;padding:4px 12px 18px}
.ac{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .08s;touch-action:none}
.ac:active{transform:scale(.94);background:rgba(255,255,255,.08)}.ac .ae{font-size:20px;display:block;margin-bottom:1px}.ac .an{font-size:10px;font-weight:600;color:rgba(255,255,255,.5)}
/* Modal */
.md{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:20;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.md>div{background:linear-gradient(180deg,rgba(40,40,70,.98),rgba(25,25,48,.98));border-radius:20px;padding:24px;text-align:center;width:85%;max-width:290px;border:1px solid rgba(255,255,255,.05)}
.md h3{font-size:17px;font-weight:700;margin-bottom:4px}.md p{color:rgba(255,255,255,.45);font-size:12px;line-height:1.5;margin-bottom:14px}
.md .mb{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:10px;color:#0a0a1a;font-size:14px;font-weight:700;padding:11px 28px;cursor:pointer;width:100%}
.md .mb:active{transform:translateY(2px)}
#toast{position:absolute;top:58%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:12px;padding:8px 18px;color:#fff;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:15}
#toast.show{opacity:1}
.lvUp{display:none;position:absolute;inset:0;z-index:30;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:6px}
.lvUp span{font-size:40px;font-weight:800;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.4);animation:lva 1.5s forwards}
@keyframes lva{0%{transform:scale(3);opacity:0}30%{transform:scale(1);opacity:1}70%{opacity:1}100%{opacity:0;transform:translateY(-25px)}}
.lvUp em{font-size:13px;color:#fff;opacity:0;animation:lvb 1s .5s forwards}@keyframes lvb{to{opacity:1}}
#settings{padding:0 12px;display:flex;gap:6px}
.stb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:10px;color:rgba(255,255,255,.3);flex:1;text-align:center}
.stb:active{background:rgba(255,255,255,.06)}
</style>
</head><body>
<div id="app">

<div id="title">
  <h1>寵物樂園</h1>
  <div class="sub">揀你嘅寵物</div>
  <div class="pick" id="pickRow"></div>
  <button class="go" id="goBtn" disabled>開始養！</button>
</div>

<div id="game">
  <div id="settings"><div class="stb" id="btnSave">💾 儲存</div><div class="stb" id="btnReset">🔄 重開</div></div>
  <div id="header"><span class="pn" id="petName"></span><span class="lv" id="petLv"></span><span class="xp" id="petExp"></span><span class="coin" id="petCoin"></span></div>
  <div id="petArea">
    <div id="petMood"></div>
    <div id="petArt"><div id="petRender"></div><div class="shadow"></div></div>
  </div>
  <div id="stats">
    <div class="st"><span class="ic">🍖</span><span class="lb">飽</span><div class="bw"><div class="bf" id="hBar" style="width:80%;background:linear-gradient(90deg,#e17055,#fdcb6e)"></div></div><span class="vl" id="hVal">80</span></div>
    <div class="st"><span class="ic">😊</span><span class="lb">樂</span><div class="bw"><div class="bf" id="pBar" style="width:80%;background:linear-gradient(90deg,#fdcb6e,#f5d76e)"></div></div><span class="vl" id="pVal">80</span></div>
    <div class="st"><span class="ic">⚡</span><span class="lb">活</span><div class="bw"><div class="bf" id="eBar" style="width:80%;background:linear-gradient(90deg,#74b9ff,#81ecec)"></div></div><span class="vl" id="eVal">80</span></div>
    <div class="st"><span class="ic">🧹</span><span class="lb">潔</span><div class="bw"><div class="bf" id="cBar" style="width:80%;background:linear-gradient(90deg,#a29bfe,#6c5ce7)"></div></div><span class="vl" id="cVal">80</span></div>
  </div>
  <div id="actions">
    <div class="ac" id="btnFeed"><span class="ae">🍖</span><span class="an">餵</span></div>
    <div class="ac" id="btnPlay"><span class="ae">🎾</span><span class="an">玩</span></div>
    <div class="ac" id="btnSleep"><span class="ae">😴</span><span class="an">瞓</span></div>
    <div class="ac" id="btnClean"><span class="ae">🛁</span><span class="an">沖涼</span></div>
  </div>
</div>

<div class="md" id="mdM"><div><h3 id="mdT"></h3><p id="mdX"></p><button class="mb" id="mdB">好嘅！</button></div></div>
<div class="lvUp" id="lvD"><span id="lvT">🌟 Lv.UP!</span><em id="lvS">成長咗！</em></div>
<div id="toast">🍖 餵食完畢！</div>

</div>
<script>
"use strict";(()=>{

const PETS = [
  {n:'小火',css:'pet-0',e:'🔥'},{n:'水水',css:'pet-1',e:'💧'},{n:'草草',css:'pet-2',e:'🌿'},
  {n:'狗狗',css:'pet-3',e:'🐶'},{n:'兔兔',css:'pet-4',e:'🐰'},{n:'吱吱',css:'pet-5',e:'🐹'}
];

const PH = [
  '<div class="pet pet-0"><div class="fl"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="lg lg-l"></div><div class="lg lg-r"></div><div class="tl"></div></div>',
  '<div class="pet pet-1"><div class="dp"></div><div class="bb"></div><div class="b2"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="lg lg-l"></div><div class="lg lg-r"></div></div>',
  '<div class="pet pet-2"><div class="lf"></div><div class="ea ea-l"></div><div class="ea ea-r"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="lg lg-l"></div><div class="lg lg-r"></div></div>',
  '<div class="pet pet-3"><div class="ea ea-l"></div><div class="ea ea-r"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="lg lg-l"></div><div class="lg lg-r"></div><div class="tl"></div></div>',
  '<div class="pet pet-4"><div class="ea ea-l"></div><div class="ea ea-r"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="lg lg-l"></div><div class="lg lg-r"></div></div>',
  '<div class="pet pet-5"><div class="ea ea-l"></div><div class="ea ea-r"></div><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="body"><div class="bl bl-l"></div><div class="bl bl-r"></div><div class="mo"></div></div><div class="ck ck-l"></div><div class="ck ck-r"></div><div class="lg lg-l"></div</div></div></div></div>',
];

const S = {pi:0,lv:1,xp:0,co:50,h:80,p:80,e:80,c:80,t:0,st:false};

function init(){
  const row=document.getElementById('pickRow');
  PETS.forEach((p,i)=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="pm">'+PH[i]+'</div><div class="pn">'+p.e+' '+p.n+'</div>';
    d.addEventListener('click',()=>pick(i));
    row.appendChild(d);
  });
  document.getElementById('goBtn').addEventListener('click',start);
  document.getElementById('btnFeed').addEventListener('click',()=>doA('feed'));
  document.getElementById('btnPlay').addEventListener('click',()=>doA('play'));
  document.getElementById('btnSleep').addEventListener('click',()=>doA('sleep'));
  document.getElementById('btnClean').addEventListener('click',()=>doA('clean'));
  document.getElementById('petArt').addEventListener('click',petTap);
  document.getElementById('mdB').addEventListener('click',()=>{document.getElementById('mdM').style.display='none';});
  document.getElementById('mdM').addEventListener('click',()=>{document.getElementById('mdM').style.display='none';});
  document.getElementById('btnSave').addEventListener('click',sv);
  document.getElementById('btnReset').addEventListener('click',rs);
}

function pick(i){
  document.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('sel',j===i));S.pi=i;
  document.getElementById('goBtn').disabled=false;
}

function start(){
  S.st=true;
  document.getElementById('title').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('petRender').innerHTML=PH[S.pi];
  up();toast('👋 你好！');
}

const AC = {
  feed:{k:'h',v:25,c:5,m:['好味！🍖','食飽飽！😋','Yummy！']},
  play:{k:'p',v:20,c:0,en:-15,m:['好開心！🎾','跳嚟跳去！🐾','過癮！🤪']},
  sleep:{k:'e',v:35,c:0,m:['zzz 😴','叉足電！⚡','好精神！']},
  clean:{k:'c',v:30,c:10,m:['洗白白！🛁','好乾淨！✨','香噴噴！🌸']}
};
var tt=null;

function doA(t){
  const a=AC[t];
  if(S.co<a.c){toast('🪙 唔夠錢，摸下寵物賺錢啦！');return;}
  if(S[a.k]>=100){toast('💯 已經滿晒！');return;}
  S.co-=a.c;S[a.k]=Math.min(100,S[a.k]+a.v);
  if(a.en)S.e=Math.max(0,S.e+a.en);
  if(t==='play')S.co+=5+~~(Math.random()*6);
  S.xp+=3+~~(Math.random()*3);
  const nd=S.lv*10;
  if(S.xp>=nd){S.xp-=nd;S.lv++;S.h=Math.min(100,S.h+10);S.p=Math.min(100,S.p+10);S.e=Math.min(100,S.e+10);S.c=Math.min(100,S.c+10);S.co+=30;
    setTimeout(()=>{document.getElementById('lvT').textContent='🌟 Lv.'+S.lv+'!';document.getElementById('lvS').textContent=PETS[S.pi].n+' 成長咗！';document.getElementById('lvD').style.display='flex';setTimeout(()=>{document.getElementById('lvD').style.display='none';},2000);},300);}
  toast(a.m[~~(Math.random()*a.m.length)]);up();
}

function petTap(){
  const el=document.getElementById('petRender');
  el.style.transform='scale(.95)';setTimeout(()=>{el.style.transform='';},200);
  S.p=Math.min(100,S.p+2);S.co+=1;up();toast('🥰 摸摸 +1🪙');
}

function up(){
  const p=PETS[S.pi];
  document.getElementById('petName').textContent=p.e+' '+p.n;
  document.getElementById('petLv').textContent='Lv.'+S.lv;
  const nd=S.lv*10;document.getElementById('petExp').textContent='EXP '+S.xp+'/'+nd;
  document.getElementById('petCoin').textContent='🪙 '+S.co;
  sb('h',S.h);sb('p',S.p);sb('e',S.e);sb('c',S.c);
  const mk={sick:{e:'🤒',t:'唔舒服...'},sad:{e:'😢',t:'唔開心...'},normal:{e:'🙂',t:'OK'},happy:{e:'😊',t:'好開心！'}};
  const ag=(S.h+S.p+S.e+S.c)/4;
  const k=S.h<15?'sick':S.h<30?'sad':ag>70?'happy':'normal';
  document.getElementById('petMood').textContent=mk[k].e;
}

function sb(id,v){document.getElementById(id+'Bar').style.width=v+'%';document.getElementById(id+'Val').textContent=v;}

function dc(){if(!S.st)return;S.t++;
  if(S.t%60!==0)return;
  S.h=Math.max(0,S.h-(2+Math.random()*2));S.p=Math.max(0,S.p-(1+Math.random()*2));
  S.e=Math.max(0,S.e-(1+Math.random()*2));S.c=Math.max(0,S.c-(1+Math.random()*2));
  up();
  if(S.h<=0||S.p<=0)md('🤒 寵物病咗','快啲餵佢食嘢或者陪佢玩！');
}

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>{el.classList.remove('show');},1800);}
function md(t,x){document.getElementById('mdT').textContent=t;document.getElementById('mdX').textContent=x;document.getElementById('mdM').style.display='flex';}
function sv(){localStorage.setItem('pet',JSON.stringify(S));toast('💾 已儲存！');}
function rs(){localStorage.removeItem('pet');S={pi:0,lv:1,xp:0,co:50,h:80,p:80,e:80,c:80,t:0,st:false};
  document.getElementById('game').style.display='none';document.getElementById('title').style.display='flex';toast('🔄 已重開！');}

// Load saved
try{const d=localStorage.getItem('pet');if(d){const o=JSON.parse(d);Object.assign(S,o);S.st=true;document.getElementById('title').style.display='none';document.getElementById('game').style.display='flex';document.getElementById('petRender').innerHTML=PH[S.pi];up();}}catch(e){}

function loop(){dc();requestAnimationFrame(loop);}
window.onload=function(){init();loop();};

})();
</script>
</body>
</html>
