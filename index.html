<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>寵物樂園</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'PingFang TC','Segoe UI',sans-serif;background:#0c0c1d;color:#fff}
#app{width:100%;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== TITLE ===== */
#title{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;background:linear-gradient(160deg,#0c0c1d,#1a0a2e,#16213e,#0f3460);}
#title h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,#f5d76e,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:2px}
#title .sub{color:rgba(255,255,255,.3);font-size:12px;letter-spacing:3px;margin-bottom:28px}
.pick{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 10px 12px;text-align:center;width:80px;cursor:pointer;transition:all .2s}
.card.sel{border-color:rgba(245,215,110,.4);background:rgba(245,215,110,.06);transform:translateY(-3px)}
.card .e{font-size:36px;display:block;margin-bottom:4px}
.card .n{font-size:12px;font-weight:600;color:rgba(255,255,255,.8)}
.go{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:14px;color:#0c0c1d;font-size:17px;font-weight:700;padding:16px 48px;margin-top:24px;cursor:pointer;box-shadow:0 4px 0 #b87200,0 8px 25px rgba(255,149,0,.2);transition:all .1s;letter-spacing:1px}
.go:disabled{opacity:.3;box-shadow:none!important;cursor:default}
.go:active{transform:translateY(4px);box-shadow:0 1px 0 #b87200}

/* ===== MAIN GAME ===== */
#game{display:none;flex-direction:column;height:100%;background:linear-gradient(180deg,#1a0a2e 0%,#16213e 30%,#0f3460 60%,#0c0c1d 100%)}

/* Header - Pet Name & Level */
#header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 4px}
#header .pn{font-size:18px;font-weight:700}
#header .pl{font-size:12px;color:rgba(255,255,255,.4);font-weight:500}
#header .exp{font-size:11px;color:rgba(255,255,255,.3);margin-left:auto;margin-right:8px}
#header .coin{font-size:14px;font-weight:600;color:#f5d76e}

/* Pet Display */
#petArea{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#petArea::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(245,215,110,.04),transparent 70%);pointer-events:none}
#petEmoji{font-size:100px;transition:all .3s;position:relative;filter:drop-shadow(0 10px 30px rgba(0,0,0,.3));cursor:pointer;-webkit-tap-highlight-color:transparent}
#petEmoji:active{transform:scale(.95)}
#petBg{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(0deg,rgba(245,215,110,.02),transparent);pointer-events:none}
#petMood{position:absolute;top:18%;font-size:32px;animation:float 2s ease-in-out infinite}

/* Stats */
#stats{padding:0 14px 6px;display:flex;flex-direction:column;gap:4px}
.stat{display:flex;align-items:center;gap:6px}
.stat .icon{font-size:14px;width:20px;text-align:center}
.stat .label{font-size:10px;color:rgba(255,255,255,.4);width:28px}
.stat .barWrap{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.stat .bar{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.stat .val{font-size:10px;color:rgba(255,255,255,.3);width:24px;text-align:right}

/* Actions */
#actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:6px 12px 16px}
.ac{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .1s;touch-action:none}
.ac:active{transform:scale(.93);background:rgba(255,255,255,.08)}
.ac .ae{font-size:22px;display:block;margin-bottom:2px}
.ac .an{font-size:11px;font-weight:600;color:rgba(255,255,255,.6)}
.ac .acost{font-size:8px;color:rgba(255,255,255,.2);margin-top:1px}
.ac.disabled{opacity:.3;pointer-events:none}

/* ===== MODAL ===== */
.md{display:none;position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:20;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.md>div{background:linear-gradient(180deg,rgba(40,40,70,.98),rgba(25,25,50,.98));border-radius:20px;padding:24px;text-align:center;width:85%;max-width:290px;border:1px solid rgba(255,255,255,.06)}
.md h3{font-size:18px;font-weight:700;margin-bottom:4px}
.md .mdEmoji{font-size:48px;display:block;margin-bottom:8px}
.md p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.5;margin-bottom:16px}
.md .mb{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:12px;color:#0c0c1d;font-size:15px;font-weight:700;padding:12px 32px;cursor:pointer;width:100%}
.md .mb:active{transform:translateY(2px)}

/* Toast */
#toast{position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:14px;padding:10px 20px;color:#fff;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:15;white-space:nowrap}
#toast.show{opacity:1}

/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}

/* Level up overlay */
.lv{display:none;position:absolute;inset:0;z-index:30;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:8px}
.lv span{font-size:42px;font-weight:800;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.5);animation:lva 1.5s forwards}
@keyframes lva{0%{transform:scale(3);opacity:0}30%{transform:scale(1);opacity:1}70%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}
.lv em{font-size:14px;color:#fff;opacity:0;animation:lvb 1s .5s forwards}
@keyframes lvb{to{opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- Title -->
<div id="title">
  <h1>寵物樂園</h1>
  <div class="sub">揀你嘅寵物夥伴</div>
  <div class="pick" id="pickRow"></div>
  <button class="go" id="goBtn" disabled>開始飼養！</button>
</div>

<!-- Game -->
<div id="game">
  <div id="header">
    <span class="pn" id="petName">🐱 小貓</span>
    <span class="pl" id="petLv">Lv.1</span>
    <span class="exp" id="petExp">EXP 0/10</span>
    <span class="coin" id="petCoin">🪙 0</span>
  </div>
  
  <div id="petArea">
    <div id="petMood"></div>
    <span id="petEmoji">🐱</span>
  </div>
  
  <div id="stats">
    <div class="stat"><span class="icon">🍖</span><span class="label">飽肚</span><div class="barWrap"><div class="bar" id="hungerBar" style="width:80%;background:linear-gradient(90deg,#e17055,#fdcb6e)"></div></div><span class="val" id="hungerVal">80</span></div>
    <div class="stat"><span class="icon">😊</span><span class="label">開心</span><div class="barWrap"><div class="bar" id="happyBar" style="width:80%;background:linear-gradient(90deg,#fdcb6e,#f5d76e)"></div></div><span class="val" id="happyVal">80</span></div>
    <div class="stat"><span class="icon">⚡</span><span class="label">活力</span><div class="barWrap"><div class="bar" id="energyBar" style="width:80%;background:linear-gradient(90deg,#74b9ff,#81ecec)"></div></div><span class="val" id="energyVal">80</span></div>
    <div class="stat"><span class="icon">🧹</span><span class="label">清潔</span><div class="barWrap"><div class="bar" id="cleanBar" style="width:80%;background:linear-gradient(90deg,#a29bfe,#6c5ce7)"></div></div><span class="val" id="cleanVal">80</span></div>
  </div>
  
  <div id="actions">
    <div class="ac" id="btnFeed"><span class="ae">🍖</span><span class="an">餵食</span><span class="acost">$5</span></div>
    <div class="ac" id="btnPlay"><span class="ae">🎾</span><span class="an">玩耍</span><span class="acost">$0</span></div>
    <div class="ac" id="btnSleep"><span class="ae">😴</span><span class="an">休息</span><span class="acost">$0</span></div>
    <div class="ac" id="btnClean"><span class="ae">🛁</span><span class="an">清潔</span><span class="acost">$10</span></div>
  </div>
</div>

<!-- Modals -->
<div class="md" id="mdM"><div><span class="mdEmoji" id="mdEmoji">🐱</span><h3 id="mdT"></h3><p id="mdX"></p><button class="mb" id="mdB">好嘅！</button></div></div>
<div class="lv" id="lvD"><span id="lvT">🌟 Lv.UP!</span><em id="lvS">新技能解鎖！</em></div>
<div id="toast">🍖 餵食完畢！</div>

</div>
<script>
"use strict";(()=>{

const PETS = [
  {e:'🐱',n:'小貓',c1:'#fdcb6e',c2:'#e17055'},
  {e:'🐶',n:'小狗',c1:'#74b9ff',c2:'#0984e3'},
  {e:'🐰',n:'兔兔',c1:'#fd79a8',c2:'#e84393'},
  {e:'🐹',n:'倉鼠',c1:'#f5d76e',c2:'#f39c12'},
  {e:'🐦',n:'小鳥',c1:'#55efc4',c2:'#00b894'},
  {e:'🐢',n:'烏龜',c1:'#81ecec',c2:'#00cec9'}
];

const MOODS = {
  happy:[{e:'😊',t:'好開心！'},{e:'😄',t:'心情好好！'},{e:'🥰',t:'好幸福！'}],
  normal:[{e:'😐',t:'冇咩特別'},{e:'🙂',t:'都OK'},{e:'👀',t:'望住你'}],
  sad:[{e:'😢',t:'唔開心...'},{e:'😞',t:'好悶...'},{e:'😔',t:'肚餓...'}],
  sick:[{e:'🤒',t:'唔舒服...'},{e:'😷',t:'病咗...'},{e:'💔',t:'好難受...'}]
};

const ACTIONS = {
  feed:{stat:'h',val:25,cost:5,msg:['好味好味！🍖','食飽飽啦！😋','Yummy yummy！']},
  play:{stat:'p',val:20,cost:0,energy:-15,msg:['玩得好開心！🎾','跳嚟跳去！🐾','好過癮！🤪']},
  sleep:{stat:'e',val:35,cost:0,msg:['zzz... 好精神！😴','叉足電！⚡','醒咗好精神！']},
  clean:{stat:'c',val:30,cost:10,msg:['洗白白！🛁','好乾淨！✨','香噴噴！🌸']}
};

// ===== STATE =====
// Stats: h=hunger, p=happy, e=energy, c=clean
const S = {
  petIdx:0, lv:1, exp:0, coin:50,
  h:80, p:80, e:80, c:80,
  t:0, // game ticks
  toast:null,
  started:false
};

// ===== INIT =====
function init(){
  const row=document.getElementById('pickRow');
  PETS.forEach((p,i)=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML='<span class="e">'+p.e+'</span><div class="n">'+p.n+'</div>';
    d.addEventListener('click',()=>pick(i));
    row.appendChild(d);
  });
  document.getElementById('goBtn').addEventListener('click',start);
  
  // Action buttons
  document.getElementById('btnFeed').addEventListener('click',()=>doAct('feed'));
  document.getElementById('btnPlay').addEventListener('click',()=>doAct('play'));
  document.getElementById('btnSleep').addEventListener('click',()=>doAct('sleep'));
  document.getElementById('btnClean').addEventListener('click',()=>doAct('clean'));
  
  // Pet tap
  document.getElementById('petEmoji').addEventListener('click',petTap);
  
  // Modal
  document.getElementById('mdB').addEventListener('click',()=>{document.getElementById('mdM').style.display='none';});
  document.getElementById('mdM').addEventListener('click',()=>{document.getElementById('mdM').style.display='none';});
}

function pick(i){
  document.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('sel',j===i));
  S.petIdx=i;
  document.getElementById('goBtn').disabled=false;
}

function start(){
  const p=PETS[S.petIdx];
  S.started=true;
  document.getElementById('title').style.display='none';
  document.getElementById('game').style.display='flex';
  updateUI();
  toast('👋 你好！我係 '+p.e+' '+p.n+'！');
  
  setTimeout(()=>{
    md(p.e,'你好！','我係 '+p.n+'，以後請多多指教！\n\n記得定时餵我食嘢\n同我玩、俾我休息\n仲要幫我沖涼！');
  },600);
}

// ===== UI UPDATE =====
function updateUI(){
  const p=PETS[S.petIdx];
  document.getElementById('petName').textContent=p.e+' '+p.n;
  document.getElementById('petLv').textContent='Lv.'+S.lv;
  const need=S.lv*10;
  document.getElementById('petExp').textContent='EXP '+S.exp+'/'+need;
  document.getElementById('petCoin').textContent='🪙 '+S.coin;
  
  // Stats
  setBar('hunger',S.h);
  setBar('happy',S.p);
  setBar('energy',S.e);
  setBar('clean',S.c);
  
  // Mood
  const mood=getMood();
  const moodInfo=MOODS[mood];
  const m=moodInfo[~~(Math.random()*moodInfo.length)];
  document.getElementById('petMood').textContent=m.e;
  document.getElementById('petMood').title=m.t;
  
  // Pet emoji animation
  const el=document.getElementById('petEmoji');
  el.textContent=p.e;
  if(mood==='sick'||mood==='sad')el.style.animation='shake .5s';
  else el.style.animation='';
}

function setBar(id,val){
  document.getElementById(id+'Bar').style.width=val+'%';
  document.getElementById(id+'Val').textContent=val;
}

function getMood(){
  const avg=(S.h+S.p+S.e+S.c)/4;
  if(S.h<15||S.p<15)return 'sick';
  if(S.h<30||S.p<30)return 'sad';
  if(avg>70)return 'happy';
  return 'normal';
}

// ===== ACTIONS =====
function doAct(type){
  const a=ACTIONS[type];
  const p=PETS[S.petIdx];
  
  // Check cost
  if(S.coin<a.cost){toast('🪙 唔夠錢... 同寵物玩可以賺錢！');return;}
  
  // Check stat caps
  const statKey={feed:'h',play:'p',sleep:'e',clean:'c'}[type];
  const curVal=S[statKey];
  if(curVal>=100){toast('💯 已經滿晒啦！');return;}
  
  // Apply
  S.coin-=a.cost;
  S[statKey]=Math.min(100,S[statKey]+a.val);
  
  // Energy cost for playing
  if(a.energy)S.e=Math.max(0,S.e+a.energy);
  
  // Play gives coins
  if(type==='play'){
    const earn=5+~~(Math.random()*6);
    S.coin+=earn;
  }
  
  // EXP gain
  const expGain=3+~~(Math.random()*3);
  S.exp+=expGain;
  
  // Level up check
  const need=S.lv*10;
  if(S.exp>=need){
    S.exp-=need;
    S.lv++;
    // Heal a bit on level up
    S.h=Math.min(100,S.h+10);
    S.p=Math.min(100,S.p+10);
    S.e=Math.min(100,S.e+10);
    S.c=Math.min(100,S.c+10);
    S.coin+=30;
    setTimeout(()=>{
      document.getElementById('lvT').textContent='🌟 Lv.'+S.lv+'!';
      document.getElementById('lvS').textContent=p.n+' 成長咗！';
      document.getElementById('lvD').style.display='flex';
      setTimeout(()=>{document.getElementById('lvD').style.display='none';},2000);
    },300);
  }
  
  // Random message
  const msg=a.msg[~~(Math.random()*a.msg.length)];
  toast(msg);
  updateUI();
}

function petTap(){
  // Pet pet animation
  const el=document.getElementById('petEmoji');
  el.style.transform='scale(1.2)';
  setTimeout(()=>{el.style.transform='scale(1)';},200);
  
  // Small happiness and coin
  S.p=Math.min(100,S.p+2);
  S.coin+=1;
  updateUI();
  toast('🥰 好舒服～ +1🪙');
}

// ===== TIME DECAY =====
function decay(){
  if(!S.started)return;
  S.t++;
  
  // Decay every 30 ticks (~3 seconds at 60fps, but let's make it every ~6 seconds at 10fps)
  if(S.t%60!==0)return;
  
  // Stats decrease over time
  S.h=Math.max(0,S.h-(2+Math.random()*2));
  S.p=Math.max(0,S.p-(1+Math.random()*2));
  S.e=Math.max(0,S.e-(1+Math.random()*2));
  S.c=Math.max(0,S.c-(1+Math.random()*2));
  
  // If very unhappy or hungry, faster decay
  if(S.h<20)S.h=Math.max(0,S.h-1);
  if(S.p<20)S.p=Math.max(0,S.p-1);
  
  updateUI();
  
  // Auto-check for sick
  if(S.h<=0||S.p<=0){
    const p=PETS[S.petIdx];
    md('🤒 寵物病咗！','寵物好唔舒服...\n快啲餵佢食嘢或者陪佢玩！');
  }
}

// ===== TOAST =====
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(S.toast);
  S.toast=setTimeout(()=>{el.classList.remove('show');},1800);
}

// ===== MODAL =====
function md(e,t,x){
  document.getElementById('mdEmoji').textContent=e||'🐱';
  document.getElementById('mdT').textContent=t;
  document.getElementById('mdX').textContent=x;
  document.getElementById('mdM').style.display='flex';
}

// ===== LOOP =====
function loop(){
  decay();
  requestAnimationFrame(loop);
}

// ===== START =====
window.onload=function(){init();loop();};

})();
</script>
</body>
</html>
