<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>寵物世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f23;font-family:'Segoe UI','PingFang TC',sans-serif;color:#fff}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative}
#title{display:flex;flex-direction:column;height:100%;width:100%;background:linear-gradient(180deg,#0f0f23 0%,#1a1a3e 40%,#2d1b4e 100%);align-items:center;justify-content:center;position:absolute;top:0;left:0;z-index:10}
.title-bg{position:absolute;width:100%;height:100%;overflow:hidden;pointer-events:none}
.title-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.title-logo{font-size:40px;font-weight:900;background:linear-gradient(135deg,#f5d76e,#ff9500,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:3px;position:relative;z-index:1}
.title-sub{color:#8a8aba;font-size:14px;margin-bottom:24px;position:relative;z-index:1;letter-spacing:1px}
.starter-pick{display:flex;gap:14px;margin:8px 0 20px;position:relative;z-index:1}
.starter-card{background:linear-gradient(180deg,#2a2a4a,#1e1e3a);border:2px solid #3a3a5a;border-radius:16px;padding:12px 10px 10px;text-align:center;cursor:pointer;width:100px;transition:all .2s;position:relative}
.starter-card.selected{border-color:#f5d76e;background:linear-gradient(180deg,#3a2a4a,#2a1e3a);box-shadow:0 0 20px rgba(245,215,110,.2)}
.starter-card .sprite-box{width:80px;height:80px;margin:0 auto 4px;position:relative}
.starter-card .sprite-box canvas{width:80px;height:80px}
.starter-card .name{color:#fff;font-size:13px;font-weight:bold}
.starter-card .element{font-size:10px;color:#8a8aba;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:2px;background:#2a2a4a}
.starter-card.selected .element{background:#4a3a2a;color:#f5d76e}
.title-btn{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:14px;color:#1a1a2e;font-size:18px;font-weight:bold;padding:14px 48px;cursor:pointer;box-shadow:0 4px 0 #b87200,0 6px 20px rgba(255,149,0,.3);position:relative;z-index:1;transition:all .1s}
.title-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #b87200}
.title-btn:disabled{opacity:.4;transform:none;box-shadow:none;cursor:default}
#overworld{display:none;flex-direction:column;height:100%;width:100%;position:relative}
#gameCanvas{flex:1;width:100%;display:block;touch-action:none;background:#3a6b3a}
#overlayUI{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;pointer-events:none;z-index:5}
.location-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:4px 12px;color:#fff;font-size:12px;font-weight:bold;pointer-events:auto}
.partner-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:4px 10px;color:#fff;font-size:11px;pointer-events:auto;display:flex;align-items:center;gap:4px}
#controls{background:linear-gradient(180deg,#1a1a3a,#0f0f23);padding:10px 12px 14px;display:flex;justify-content:center;align-items:center;gap:10px;flex-shrink:0;border-top:1px solid #2a2a4a}
.dpad{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:44px 44px;gap:3px;justify-content:center}
.dpad-btn{background:linear-gradient(135deg,#2a2a4a,#1e1e3e);border:1px solid #3a3a5a;border-radius:10px;color:#aaa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;box-shadow:inset 0 -2px 0 #0f0f23}
.dpad-btn:active{background:linear-gradient(135deg,#3a3a5a,#2a2a4a);transform:scale(.93);color:#fff}
.btn-up{grid-column:2;grid-row:1}
.btn-left{grid-column:1;grid-row:2}
.btn-down{grid-column:2;grid-row:2}
.btn-right{grid-column:3;grid-row:2}
.menu-btn{background:linear-gradient(135deg,#3a2a4a,#2a1e3a);border:1px solid #5a4a6a;border-radius:10px;color:#d0b0e0;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;box-shadow:inset 0 -2px 0 #1a0f2a;white-space:nowrap}
.menu-btn:active{transform:scale(.95)}
#battle{display:none;flex-direction:column;height:100%;width:100%;position:relative}
#battleCanvas{width:100%;flex:1;display:block;touch-action:none}
.battle-panel{background:linear-gradient(180deg,#1a1a3a,#0f0f23);flex-shrink:0;border-top:2px solid #2a2a4a;padding:8px 10px 14px}
.battle-hud{display:flex;gap:8px;margin-bottom:6px}
.hp-card{flex:1;background:rgba(255,255,255,.06);border-radius:10px;padding:6px 10px;backdrop-filter:blur(4px)}
.hp-card .top{display:flex;justify-content:space-between;align-items:center}
.hp-card .pname{color:#fff;font-size:13px;font-weight:bold}
.hp-card .plv{color:#8a8aba;font-size:10px}
.hp-card .bar-wrap{height:7px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;margin:3px 0 2px}
.hp-card .bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-fill.green{background:linear-gradient(90deg,#4cd964,#34c759);box-shadow:0 0 6px rgba(76,217,100,.4)}
.bar-fill.yellow{background:linear-gradient(90deg,#ff9500,#ffcc00);box-shadow:0 0 6px rgba(255,149,0,.4)}
.bar-fill.red{background:linear-gradient(90deg,#ff3b30,#ff6b6b);box-shadow:0 0 6px rgba(255,59,48,.4)}
.hp-card .num{color:#8a8aba;font-size:10px;text-align:right}
.battle-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.act-btn{background:linear-gradient(135deg,#2a2a4a,#1e1e3e);border:1px solid #3a3a5a;border-radius:10px;color:#ccc;font-size:14px;font-weight:bold;padding:12px 0;text-align:center;cursor:pointer;box-shadow:inset 0 -2px 0 #0f0f23;transition:all .1s}
.act-btn:active{transform:scale(.95);background:#3a3a5a}
.act-btn.primary{background:linear-gradient(135deg,#e8a838,#d4892a);border-color:#e8a838;color:#1a1a2e;box-shadow:inset 0 -2px 0 #a06a10}
.act-btn.success{background:linear-gradient(135deg,#4cd964,#34c759);border-color:#4cd964;color:#1a1a2e;box-shadow:inset 0 -2px 0 #2a9a3a}
.act-btn.danger{background:linear-gradient(135deg,#ff3b30,#d62d20);border-color:#ff3b30;color:#fff;box-shadow:inset 0 -2px 0 #8a1a10}
.battle-msg{background:rgba(0,0,0,.5);border-radius:10px;padding:8px 12px;color:#ddd;font-size:13px;line-height:1.4;min-height:36px;text-align:center;backdrop-filter:blur(4px)}
.modal-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:20;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border-radius:18px;padding:24px;max-width:88%;width:320px;text-align:center;border:1px solid #3a3a5a;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.modal-title{color:#fff;font-size:18px;font-weight:bold;margin-bottom:8px}
.modal-text{color:#b0b0d0;font-size:13px;line-height:1.6;margin-bottom:16px;white-space:pre-wrap}
.modal-btn{background:linear-gradient(135deg,#f5d76e,#ff9500);border:none;border-radius:12px;color:#1a1a2e;font-size:15px;font-weight:bold;padding:12px 32px;cursor:pointer;box-shadow:0 3px 0 #b87200}
.modal-btn:active{transform:translateY(3px);box-shadow:0 0 0 #b87200}
.lvup-overlay,.evo-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;align-items:center;justify-content:center;pointer-events:none;flex-direction:column;gap:10px}
.lvup-text{font-size:40px;font-weight:900;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.5),0 4px 10px rgba(0,0,0,.5);animation:lvAnim 1.2s ease-out forwards}
@keyframes lvAnim{0%{transform:scale(2) rotate(-5deg);opacity:0}30%{transform:scale(1) rotate(0);opacity:1}60%{opacity:1}100%{opacity:0;transform:scale(.8) translateY(-30px)}}
.evo-overlay{background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);z-index:40}
.evo-text{font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 50px rgba(255,255,255,.6);animation:evoPulse 2s ease-out}
.evo-sub{color:#ffd700;font-size:16px;opacity:0;animation:fadeIn 1s ease-out 1s forwards}
@keyframes evoPulse{0%{transform:scale(3);opacity:0}20%{transform:scale(1);opacity:1}50%{transform:scale(1.15);color:#ffd700}80%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div id="title">
    <div class="title-bg" id="starBG"></div>
    <div class="title-logo">寵物世界</div>
    <div class="title-sub">揀你嘅第一隻夥伴</div>
    <div class="starter-pick" id="starterPick"></div>
    <button class="title-btn" id="startBtn" disabled onclick="startGame()">出發冒險！</button>
  </div>
  <div id="overworld">
    <div id="overlayUI">
      <div class="location-badge" id="locBadge">🌿 草原</div>
      <div class="partner-badge" id="partnerBadge"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
      <div class="dpad">
        <div class="dpad-btn btn-up" ontouchstart="movePlayer(0,-1)" onmousedown="movePlayer(0,-1)">▲</div>
        <div class="dpad-btn btn-left" ontouchstart="movePlayer(-1,0)" onmousedown="movePlayer(-1,0)">◀</div>
        <div class="dpad-btn btn-down" ontouchstart="movePlayer(0,1)" onmousedown="movePlayer(0,1)">▼</div>
        <div class="dpad-btn btn-right" ontouchstart="movePlayer(1,0)" onmousedown="movePlayer(1,0)">▶</div>
      </div>
      <button class="menu-btn" onclick="showBag()">🎒 寵物</button>
    </div>
  </div>
  <div id="battle">
    <canvas id="battleCanvas"></canvas>
    <div class="battle-panel">
      <div class="battle-hud">
        <div class="hp-card"><div class="top"><span class="pname" id="myPN">火火</span><span class="plv" id="myPL">Lv.1</span></div><div class="bar-wrap"><div class="bar-fill green" id="myBar" style="width:100%"></div></div><div class="num" id="myNum">100/100</div></div>
        <div class="hp-card"><div class="top"><span class="pname" id="enPN">比比</span><span class="plv" id="enPL">Lv.1</span></div><div class="bar-wrap"><div class="bar-fill green" id="enBar" style="width:100%"></div></div><div class="num" id="enNum">100/100</div></div>
      </div>
      <div class="battle-actions" id="btlActs"></div>
      <div class="battle-msg" id="btlMsg">選擇行動！</div>
    </div>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal-box"><div class="modal-title" id="modalT"></div><div class="modal-text" id="modalX"></div><button class="modal-btn" onclick="closeModal()">確定</button></div>
  </div>
  <div class="lvup-overlay" id="lvupO"><div class="lvup-text" id="lvupT"></div></div>
  <div class="evo-overlay" id="evoO"><div class="evo-text" id="evoT"></div><div class="evo-sub" id="evoSub"></div></div>
</div>
<script>
"use strict";
// ===== CANVAS DRAWING ENGINE =====
// drawPet(ctx, type, x, y, size, facingLeft, anim)
// type: 'fire','water','grass','fire2','water2','grass2','bird','bat','egg'

var animFrame = 0;

function drawPet(ctx, type, x, y, size, facingLeft, anim) {
  ctx.save();
  if (facingLeft) {
    ctx.translate(x + size/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(x + size/2), 0);
  }
  var s = size;
  var cx = x + s/2;
  var cy = y + s/2;
  var bob = Math.sin((anim||animFrame) * 0.06) * s * 0.02;

  function eye(ex, ey, sz) {
    ctx.beginPath();
    ctx.ellipse(ex, ey, sz*0.35, sz*0.38, 0, 0, Math.PI*2);
    ctx.fillStyle = '#222';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex + sz*0.08, ey - sz*0.08, sz*0.12, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
  function blush(bx, by, sz) {
    ctx.beginPath();
    ctx.ellipse(bx, by, sz*0.15, sz*0.09, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,120,120,0.3)';
    ctx.fill();
  }
  function mouth(mx, my, w) {
    ctx.beginPath();
    ctx.arc(mx, my, w*0.5, 0.1, Math.PI-0.1);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  function foot(fx, fy, fs, clr) {
    ctx.beginPath();
    ctx.ellipse(fx, fy, fs*0.18, fs*0.14, 0, 0, Math.PI*2);
    ctx.fillStyle = clr;
    ctx.fill();
  }
  function bodyGrad(cx2, cy2, c1, c2) {
    var g = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, s*0.32);
    g.addColorStop(0, c1);
    g.addColorStop(1, c2);
    return g;
  }

  var by2 = cy + s*0.05 + bob;
  var types = {
    fire: function() {
      // Flame crown
      ctx.beginPath();
      ctx.moveTo(cx - s*0.18, cy - s*0.30 + bob);
      ctx.quadraticCurveTo(cx - s*0.20, cy - s*0.44, cx - s*0.04, cy - s*0.36);
      ctx.quadraticCurveTo(cx, cy - s*0.52, cx + s*0.04, cy - s*0.36);
      ctx.quadraticCurveTo(cx + s*0.20, cy - s*0.44, cx + s*0.18, cy - s*0.30);
      ctx.closePath();
      ctx.fillStyle = '#ff9500';
      ctx.fill();
      // Inner bright flame
      ctx.beginPath();
      ctx.moveTo(cx - s*0.08, cy - s*0.32 + bob);
      ctx.quadraticCurveTo(cx - s*0.10, cy - s*0.42, cx, cy - s*0.46);
      ctx.quadraticCurveTo(cx + s*0.10, cy - s*0.42, cx + s*0.08, cy - s*0.32);
      ctx.closePath();
      ctx.fillStyle = '#ffd93d';
      ctx.fill();
      // Body - round chibi
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.30, s*0.32, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#ff6b35', '#d63031');
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.10, by2 - s*0.08, s*0.16);
        eye(cx + s*0.10, by2 - s*0.08, s*0.16);
        blush(cx - s*0.18, by2 + s*0.02, s);
        blush(cx + s*0.18, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.10, s*0.08);
      }
      foot(cx - s*0.12, cy + s*0.30 + bob, s, '#c0392b');
      foot(cx + s*0.12, cy + s*0.30 + bob, s, '#c0392b');
      // Stubby arms
      ctx.beginPath();
      ctx.ellipse(cx - s*0.35, by2 + s*0.04, s*0.07, s*0.10, 0.3, 0, Math.PI*2);
      ctx.fillStyle = '#d63031';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.35, by2 + s*0.04, s*0.07, s*0.10, -0.3, 0, Math.PI*2);
      ctx.fill();
    },
    water: function() {
      // Water droplet crest
      ctx.beginPath();
      ctx.ellipse(cx, cy - s*0.38 + bob, s*0.10, s*0.16, 0, 0, Math.PI*2);
      ctx.fillStyle = '#74b9ff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - s*0.02, cy - s*0.42 + bob, s*0.045, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
      // Body
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.30, s*0.30, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#81ecec', '#0984e3');
      ctx.fill();
      // Fins
      ctx.beginPath();
      ctx.ellipse(cx - s*0.32, by2 + s*0.02, s*0.04, s*0.12, 0.3, 0, Math.PI*2);
      ctx.fillStyle = '#74b9ff';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.32, by2 + s*0.02, s*0.04, s*0.12, -0.3, 0, Math.PI*2);
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.10, by2 - s*0.07, s*0.16);
        eye(cx + s*0.10, by2 - s*0.07, s*0.16);
        blush(cx - s*0.18, by2 + s*0.02, s);
        blush(cx + s*0.18, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.10, s*0.08);
      }
      foot(cx - s*0.12, cy + s*0.28 + bob, s, '#0984e3');
      foot(cx + s*0.12, cy + s*0.28 + bob, s, '#0984e3');
    },
    grass: function() {
      // Leaf sprout on head
      ctx.beginPath();
      ctx.ellipse(cx, cy - s*0.40 + bob, s*0.07, s*0.16, 0, 0, Math.PI*2);
      ctx.fillStyle = '#00b894';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx - s*0.03, cy - s*0.45 + bob, s*0.04, s*0.08, -0.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
      // Side leaves
      ctx.beginPath();
      ctx.ellipse(cx - s*0.26, by2 - s*0.15, s*0.06, s*0.12, -0.6, 0, Math.PI*2);
      ctx.fillStyle = '#00b894';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.26, by2 - s*0.15, s*0.06, s*0.12, 0.6, 0, Math.PI*2);
      ctx.fill();
      // Body
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.30, s*0.30, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#55efc4', '#00b894');
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.10, by2 - s*0.07, s*0.16);
        eye(cx + s*0.10, by2 - s*0.07, s*0.16);
        blush(cx - s*0.18, by2 + s*0.02, s);
        blush(cx + s*0.18, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.10, s*0.08);
      }
      foot(cx - s*0.12, cy + s*0.28 + bob, s, '#00a87e');
      foot(cx + s*0.12, cy + s*0.28 + bob, s, '#00a87e');
    },
    fire2: function() {
      // Triple flame crown
      for (var i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i*s*0.12 - s*0.08, cy - s*0.32 + bob);
        ctx.quadraticCurveTo(cx + i*s*0.12 - s*0.10, cy - s*0.48, cx + i*s*0.12, cy - s*0.46);
        ctx.quadraticCurveTo(cx + i*s*0.12 + s*0.10, cy - s*0.48, cx + i*s*0.12 + s*0.08, cy - s*0.32);
        ctx.closePath();
        ctx.fillStyle = i === 0 ? '#ffd93d' : '#ff9500';
        ctx.fill();
      }
      // Bigger body
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.34, s*0.36, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#ff6b35', '#c0392b');
      ctx.fill();
      // Flame aura
      ctx.beginPath();
      ctx.arc(cx, cy + s*0.15 + bob, s*0.38, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,100,0,0.08)';
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.12, by2 - s*0.09, s*0.18);
        eye(cx + s*0.12, by2 - s*0.09, s*0.18);
        blush(cx - s*0.22, by2 + s*0.02, s);
        blush(cx + s*0.22, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.12, s*0.10);
      }
      foot(cx - s*0.14, cy + s*0.33 + bob, s, '#a93226');
      foot(cx + s*0.14, cy + s*0.33 + bob, s, '#a93226');
    },
    water2: function() {
      // Big crest
      ctx.beginPath();
      ctx.ellipse(cx, cy - s*0.38 + bob, s*0.14, s*0.20, 0, 0, Math.PI*2);
      ctx.fillStyle = '#0984e3';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - s*0.03, cy - s*0.43 + bob, s*0.06, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
      // Bigger body
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.34, s*0.34, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#81ecec', '#0984e3');
      ctx.fill();
      // Water aura
      ctx.beginPath();
      ctx.arc(cx, cy + s*0.32 + bob, s*0.34, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,150,255,0.06)';
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.12, by2 - s*0.08, s*0.18);
        eye(cx + s*0.12, by2 - s*0.08, s*0.18);
        blush(cx - s*0.22, by2 + s*0.02, s);
        blush(cx + s*0.22, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.12, s*0.10);
      }
      foot(cx - s*0.14, cy + s*0.32 + bob, s, '#0874b8');
      foot(cx + s*0.14, cy + s*0.32 + bob, s, '#0874b8');
    },
    grass2: function() {
      // Flower on head
      ctx.beginPath();
      ctx.arc(cx, cy - s*0.38 + bob, s*0.08, 0, Math.PI*2);
      ctx.fillStyle = '#ff6b9d';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - s*0.04, cy - s*0.43 + bob, s*0.04, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
      // Bigger leaves on sides
      ctx.beginPath();
      ctx.ellipse(cx - s*0.28, by2 - s*0.18, s*0.07, s*0.15, -0.6, 0, Math.PI*2);
      ctx.fillStyle = '#00b894';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.28, by2 - s*0.18, s*0.07, s*0.15, 0.6, 0, Math.PI*2);
      ctx.fill();
      // Bigger body
      ctx.beginPath();
      ctx.ellipse(cx, by2, s*0.34, s*0.34, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#55efc4', '#00b894');
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy + s*0.32 + bob, s*0.34, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,200,100,0.06)';
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.12, by2 - s*0.08, s*0.18);
        eye(cx + s*0.12, by2 - s*0.08, s*0.18);
        blush(cx - s*0.22, by2 + s*0.02, s);
        blush(cx + s*0.22, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.12, s*0.10);
      }
      foot(cx - s*0.14, cy + s*0.32 + bob, s, '#008a6e');
      foot(cx + s*0.14, cy + s*0.32 + bob, s, '#008a6e');
    },
    bird: function() {
      // Fluffy round body
      var bw = s*0.28, bh = s*0.28;
      ctx.beginPath();
      ctx.ellipse(cx, by2 + s*0.02, bw, bh, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#81ecec', '#00b894');
      ctx.fill();
      // Beak
      ctx.beginPath();
      ctx.moveTo(cx + s*0.04, by2 - s*0.06);
      ctx.lineTo(cx + s*0.20, by2 - s*0.01);
      ctx.lineTo(cx + s*0.04, by2 + s*0.04);
      ctx.closePath();
      ctx.fillStyle = '#f39c12';
      ctx.fill();
      // Wing
      ctx.beginPath();
      ctx.ellipse(cx - s*0.18, by2 - s*0.02, s*0.12, s*0.18, -0.2 + Math.sin((anim||animFrame)*0.08)*0.15, 0, Math.PI*2);
      ctx.fillStyle = '#00a87e';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.18, by2 - s*0.02, s*0.12, s*0.18, 0.2 - Math.sin((anim||animFrame)*0.08)*0.15, 0, Math.PI*2);
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.08, by2 - s*0.06, s*0.14);
        eye(cx + s*0.08, by2 - s*0.06, s*0.14);
        blush(cx - s*0.14, by2 + s*0.04, s);
        blush(cx + s*0.14, by2 + s*0.04, s);
        mouth(cx + s*0.08, by2 + s*0.04, s*0.04);
      }
      // Feet
      ctx.beginPath();
      ctx.ellipse(cx - s*0.06, cy + s*0.26 + bob, s*0.04, s*0.06, 0, 0, Math.PI*2);
      ctx.fillStyle = '#f39c12';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s*0.06, cy + s*0.26 + bob, s*0.04, s*0.06, 0, 0, Math.PI*2);
      ctx.fill();
    },
    bat: function() {
      var wSwing = Math.sin((anim||animFrame)*0.08) * 0.25;
      // Round body
      ctx.beginPath();
      ctx.ellipse(cx, by2 + s*0.02, s*0.26, s*0.28, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#9b59b6', '#6c3483');
      ctx.fill();
      // Wings
      ctx.beginPath();
      ctx.moveTo(cx - s*0.12, by2 - s*0.04);
      ctx.quadraticCurveTo(cx - s*0.36 - wSwing*s*0.1, by2 - s*0.20 + wSwing*s*0.2, cx - s*0.40 - wSwing*s*0.1, by2 + s*0.12 - wSwing*s*0.1);
      ctx.quadraticCurveTo(cx - s*0.20, by2 - s*0.02, cx - s*0.12, by2 - s*0.04);
      ctx.fillStyle = '#8e44ad';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + s*0.12, by2 - s*0.04);
      ctx.quadraticCurveTo(cx + s*0.36 + wSwing*s*0.1, by2 - s*0.20 + wSwing*s*0.2, cx + s*0.40 + wSwing*s*0.1, by2 + s*0.12 - wSwing*s*0.1);
      ctx.quadraticCurveTo(cx + s*0.20, by2 - s*0.02, cx + s*0.12, by2 - s*0.04);
      ctx.fill();
      // Small fangs
      ctx.beginPath();
      ctx.moveTo(cx - s*0.04, by2 + s*0.10);
      ctx.lineTo(cx - s*0.03, by2 + s*0.14);
      ctx.lineTo(cx - s*0.01, by2 + s*0.10);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + s*0.01, by2 + s*0.10);
      ctx.lineTo(cx + s*0.03, by2 + s*0.14);
      ctx.lineTo(cx + s*0.04, by2 + s*0.10);
      ctx.fill();
      if (s > 20) {
        eye(cx - s*0.09, by2 - s*0.06, s*0.15);
        eye(cx + s*0.09, by2 - s*0.06, s*0.15);
        blush(cx - s*0.16, by2 + s*0.02, s);
        blush(cx + s*0.16, by2 + s*0.02, s);
      }
      // Tiny feet
      foot(cx - s*0.08, cy + s*0.28 + bob, s, '#6c3483');
      foot(cx + s*0.08, cy + s*0.28 + bob, s, '#6c3483');
    },
    egg: function() {
      // Egg-shaped body
      ctx.beginPath();
      ctx.ellipse(cx, by2 + s*0.02, s*0.25, s*0.34, 0, 0, Math.PI*2);
      ctx.fillStyle = bodyGrad(cx, by2, '#ffeaa7', '#fdcb6e');
      ctx.fill();
      // Crack patterns
      ctx.beginPath();
      ctx.moveTo(cx, by2 - s*0.12);
      ctx.lineTo(cx + s*0.04, by2 - s*0.08);
      ctx.lineTo(cx + s*0.02, by2 - s*0.04);
      ctx.lineTo(cx + s*0.06, by2);
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - s*0.06, by2 - s*0.06);
      ctx.lineTo(cx - s*0.02, by2 - s*0.02);
      ctx.lineTo(cx - s*0.04, by2 + s*0.02);
      ctx.stroke();
      if (s > 20) {
        eye(cx - s*0.09, by2 - s*0.10, s*0.15);
        eye(cx + s*0.09, by2 - s*0.10, s*0.15);
        blush(cx - s*0.16, by2 + s*0.02, s);
        blush(cx + s*0.16, by2 + s*0.02, s);
        mouth(cx, by2 + s*0.06, s*0.06);
      }
    }
  };

  if (types[type]) types[type]();
  ctx.restore();
}

// ===== GAME DATA =====
var STARTERS = [
  {id:'fire', name:'火火', el:'火', clr:'#e74c3c'},
  {id:'water', name:'水水', el:'水', clr:'#3498db'},
  {id:'grass', name:'草草', el:'草', clr:'#2ecc71'}
];

var PET_DATA = {
  fire: {name:'火火', el:'火', evolve:'fire2', hp:100, atk:15, def:10},
  water: {name:'水水', el:'水', evolve:'water2', hp:100, atk:12, def:13},
  grass: {name:'草草', el:'草', evolve:'grass2', hp:100, atk:13, def:12},
  fire2: {name:'炎獸', el:'火', evolve:null, hp:150, atk:25, def:18},
  water2: {name:'海獸', el:'水', evolve:null, hp:150, atk:20, def:22},
  grass2: {name:'森獸', el:'草', evolve:null, hp:150, atk:22, def:20},
  bird: {name:'比比', el:'飛', evolve:null, hp:80, atk:18, def:8},
  bat: {name:'蝙蝠', el:'超', evolve:null, hp:75, atk:16, def:10},
  egg: {name:'蛋蛋', el:'普', evolve:null, hp:50, atk:5, def:20}
};

var TYPE_CHART = {
  fire: {water:0.5, grass:2.0, flying:1.5, normal:1, psychic:1, earth:0.5, fire:0.5},
  water: {fire:2.0, grass:0.5, normal:1, flying:1, psychic:1, earth:1.5, water:0.5},
  grass: {fire:0.5, water:2.0, normal:1, flying:0.5, psychic:1, earth:1.5, grass:0.5},
  flying: {fire:1, water:1, grass:1.5, normal:1, flying:1, psychic:1, earth:0.5},
  psychic: {fire:1, water:1, grass:1, normal:1.5, flying:1, psychic:0.5, earth:1},
  earth: {fire:1.5, water:1, grass:0.5, normal:1, flying:0.5, psychic:1, earth:1},
  normal: {fire:1, water:1, grass:1, normal:1, flying:1, psychic:0.5, earth:1}
};

function typeEff(atkEl, defEl) {
  var chart = TYPE_CHART[atkEl];
  if (!chart) return 1;
  return chart[defEl] || 1;
}

// ===== GAME STATE =====
var selectedID = 0;
var game = {};

function init() {
  // Stars
  var sb = document.getElementById('starBG');
  for (var i = 0; i < 30; i++) {
    var s = document.createElement('div');
    s.className = 'title-star';
    s.style.left = (Math.random()*100)+'%';
    s.style.top = (Math.random()*100)+'%';
    s.style.animationDelay = (Math.random()*2)+'s';
    s.style.width = s.style.height = (1+Math.random()*2)+'px';
    sb.appendChild(s);
  }
  // Starter cards
  var row = document.getElementById('starterPick');

    (function(idx){c.onclick=function(){selectStarter(idx);};})(i);
    row.appendChild(c);
    setTimeout(function() {
      var cvs = document.getElementById('starterCvs'+idx(i));
      if (cvs) {
        var cx = cvs.getContext('2d');
        drawPet(cx, STARTERS[i].id, 10, 10, 60, false, 0);
      }
    }, 50);
  });
  function idx(i) {
    // fix the closure - draw after appended
  }
  // delayed draw
  setTimeout(drawStarters, 100);
}

function drawStarters() {
  for (var i = 0; i < STARTERS.length; i++) {
    var cvs = document.getElementById('starterCvs'+i);
    if (cvs) {
      var cx = cvs.getContext('2d');
      drawPet(cx, STARTERS[i].id, 10, 10, 60, false, 0);

}

function selectStarter(i) {
  selectedID = i;
  var cards = document.querySelectorAll('.starter-card');
  cards.forEach(function(c,j){c.classList.toggle('selected',j===i);});
  document.getElementById('startBtn').disabled = false;
  drawStarters();
}
function startGame() {
  var p = STARTERS[selectedID];
  game = {
    player: {x:5, y:5, dir:'down'},
    pets: [
      {id:p.id, name:p.name, lv:1, hp:100, maxHp:100, atk:15, def:10, xp:0, xpNext:20, dirty:false},
      {id:'egg', name:'蛋蛋', lv:1, hp:50, maxHp:50, atk:5, def:20, xp:0, xpNext:20},
    ],
    active: 0,
    bagOpen: false,
    wildEncounters: 0
  };
  document.getElementById('title').style.display = 'none';
  document.getElementById('overworld').style.display = 'flex';
  document.getElementById('partnerBadge').textContent = '🐾 '+p.name;
  initOverworld();
}

<script>
// ===== OVERWORLD =====
var mapData, player, ovCtx, ovCvs, encTimer;
var TILE = 32;
var MAP_W = 30, MAP_H = 20;

var TILES = {
  grass: 0, path: 1, water: 2, tree: 3, flower: 4, rock: 5
};

var MAP = [];

function genMap() {
  MAP = [];
  for (var y = 0; y < MAP_H; y++) {
    MAP[y] = [];
    for (var x = 0; x < MAP_W; x++) {
      if (x===0||x===MAP_W-1||y===0||y===MAP_H-1) MAP[y][x] = TILES.tree;
      else if (Math.random()<0.04) MAP[y][x] = TILES.tree;
      else if (Math.random()<0.02) MAP[y][x] = TILES.rock;
      else if (Math.random()<0.03) MAP[y][x] = TILES.flower;
      else MAP[y][x] = Math.random()<0.85 ? TILES.grass : TILES.path;
    }
  }
  // clear starting area
  for (var dy = -1; dy <= 1; dy++)
    for (var dx = -1; dx <= 1; dx++)
      MAP[5+dy][5+dx] = TILES.grass;
}

function initOverworld() {
  genMap();
  player = game.player;
  ovCvs = document.getElementById('gameCanvas');
  ovCtx = ovCvs.getContext('2d');
  resizeOverworld();
  window.addEventListener('resize', resizeOverworld);
  encTimer = 0;
  requestAnimationFrame(loopOverworld);
}

function resizeOverworld() {
  var rect = ovCvs.parentElement.getBoundingClientRect();
  ovCvs.width = ovCvs.clientWidth || 320;
  ovCvs.height = ovCvs.clientHeight || 300;
}

function movePlayer(dx, dy) {
  if (!game || !game.player) return;
  var nx = player.x + dx;
  var ny = player.y + dy;
  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  if (MAP[ny][nx] === TILES.tree || MAP[ny][nx] === TILES.water || MAP[ny][nx] === TILES.rock) return;
  player.x = nx;
  player.y = ny;
  player.dir = dy < 0 ? 'up' : dy > 0 ? 'down' : dx < 0 ? 'left' : 'right';
  // Update location
  var locs = ['🌿 草原','🌿 草地','🌲 樹林','🌊 水邊','🌸 花園'];
  document.getElementById('locBadge').textContent = locs[Math.floor(Math.random()*locs.length)];
  // Random encounter
  encTimer++;
  if (encTimer > 5 && Math.random() < 0.12) {
    encTimer = 0;
    startBattle();
  }
}

function loopOverworld() {
  drawOverworld();
  animFrame++;
  requestAnimationFrame(loopOverworld);
}

function drawOverworld() {
  var ctx = ovCtx;
  var cw = ovCvs.width;
  var ch = ovCvs.height;
  var tw = Math.ceil(cw / TILE) + 2;
  var th = Math.ceil(ch / TILE) + 2;
  var ox = player.x - Math.floor(tw/2);
  var oy = player.y - Math.floor(th/2);

  var tileColors = {
    0: '#5a9e5a', 1: '#b8a87a', 2: '#3a7aba',
    3: '#2a6a2a', 4: '#9aca5a', 5: '#6a6a5a'
  };

  // Draw ground
  for (var ty = 0; ty < th; ty++) {
    for (var tx = 0; tx < tw; tx++) {
      var mx = ox + tx;
      var my = oy + ty;
      if (mx < 0 || mx >= MAP_W || my < 0 || my >= MAP_H) continue;
      var t = MAP[my][mx];
      ctx.fillStyle = tileColors[t] || '#5a9e5a';
      ctx.fillRect(tx*TILE, ty*TILE, TILE, TILE);
      // decorative details
      if (t === TILES.flower) {
        ctx.beginPath();
        ctx.arc(tx*TILE+16, ty*TILE+16, 3, 0, Math.PI*2);
        ctx.fillStyle = '#ff6b9d';
        ctx.fill();
      }
    }
  }

  // Draw partner pet following
  var px = (player.x - ox) * TILE;
  var py = (player.y - oy) * TILE;
  var pet = game.pets[game.active];
  if (pet) {
    ctx.save();
    ctx.translate(px - 8, py - TILE);
    drawPet(ctx, pet.id, -2, -2, 24, false, animFrame);
    ctx.restore();
  }

  // Draw player
  ctx.fillStyle = '#6c5ce7';
  ctx.beginPath();
  ctx.arc(px+16, py+16, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px+12, py+13, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px+20, py+13, 3, 0, Math.PI*2);
  ctx.fill();
  // highlight
  ctx.fillStyle = '#a29bfe';
  ctx.beginPath();
  ctx.arc(px+11, py+12, 1.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px+19, py+12, 1.5, 0, Math.PI*2);
  ctx.fill();
}

// ===== BATTLE =====
var battle = null;

function startBattle() {
  document.getElementById('overworld').style.display = 'none';
  document.getElementById('battle').style.display = 'flex';
  var wildTypes = ['bird','bat','egg','fire','water','grass'];
  var myPet = game.pets[game.active];
  var wildId = wildTypes[Math.floor(Math.random()*wildTypes.length)];
  var wildData = PET_DATA[wildId];
  var wildLv = Math.max(1, myPet.lv + Math.floor(Math.random()*3) - 1);
  var wildHp = Math.floor(wildData.hp * (1 + wildLv * 0.1));

  battle = {
    my: {id:myPet.id, name:myPet.name, lv:myPet.lv, hp:myPet.hp, maxHp:myPet.maxHp, atk:myPet.atk, def:myPet.def},
    enemy: {id:wildId, name:wildData.name, lv:wildLv, hp:wildHp, maxHp:wildHp, atk:Math.floor(wildData.atk*(1+wildLv*0.08)), def:Math.floor(wildData.def*(1+wildLv*0.08))},
    turn: 'player',
    ended: false
  };

  updateBattleUI();
  drawBattle();
  setupBattleActions();
}

function updateBattleUI() {
  var b = battle;
  document.getElementById('myPN').textContent = b.my.name;
  document.getElementById('myPL').textContent = 'Lv.'+b.my.lv;
  document.getElementById('enPN').textContent = b.enemy.name;
  document.getElementById('enPL').textContent = 'Lv.'+b.enemy.lv;
  var hpPct = (b.my.hp / b.my.maxHp * 100);
  document.getElementById('myBar').style.width = hpPct+'%';
  document.getElementById('myBar').className = 'bar-fill '+(hpPct>50?'green':hpPct>25?'yellow':'red');
  document.getElementById('myNum').textContent = Math.ceil(b.my.hp)+'/'+b.my.maxHp;
  var ePct = (b.enemy.hp / b.enemy.maxHp * 100);
  document.getElementById('enBar').style.width = ePct+'%';
  document.getElementById('enBar').className = 'bar-fill '+(ePct>50?'green':ePct>25?'yellow':'red');
  document.getElementById('enNum').textContent = Math.ceil(b.enemy.hp)+'/'+b.enemy.maxHp;
}

function setupBattleActions() {
  var acts = document.getElementById('btlActs');
  acts.innerHTML = '';
  var btns = [
    {text:'⚔️ 攻擊', cls:'primary', action:function(){doAttack();}},
    {text:'💪 重擊', cls:'danger', action:function(){doHeavy();}},
    {text:'🛡️ 防禦', cls:'success', action:function(){doDefend();}},
    {text:'🏃 逃走', cls:'', action:function(){doFlee();}}
  ];
  btns.forEach(function(b) {
    var el = document.createElement('div');
    el.className = 'act-btn ' + b.cls;
    el.textContent = b.text;
    el.onclick = b.action;
    acts.appendChild(el);
  });
}

function doAttack() {
  if (battle.ended) return;
  var eff = typeEff(PET_DATA[battle.my.id].el, PET_DATA[battle.enemy.id].el);
  var dmg = Math.max(1, Math.floor(battle.my.atk * 1.2 * eff * (0.85 + Math.random()*0.3) - battle.enemy.def*0.4));
  battle.enemy.hp = Math.max(0, battle.enemy.hp - dmg);
  var msg = battle.my.name+' 使用左 普通攻擊！';
  if (eff > 1) msg += '\n效果超群！';
  else if (eff < 1) msg += '\n效果不佳...';
  msg += '\n造成 '+dmg+' 傷害！';
  document.getElementById('btlMsg').textContent = msg;
  updateBattleUI();
  drawBattle();
  if (battle.enemy.hp <= 0) { battleWon(); return; }
  setTimeout(enemyTurn, 800);
}

function doHeavy() {
  if (battle.ended) return;
  var eff = typeEff(PET_DATA[battle.my.id].el, PET_DATA[battle.enemy.id].el);
  var dmg = Math.max(1, Math.floor(battle.my.atk * 2.0 * eff * (0.8 + Math.random()*0.4) - battle.enemy.def*0.3));
  battle.enemy.hp = Math.max(0, battle.enemy.hp - dmg);
  var msg = battle.my.name+' 使用左 全力重擊！';
  if (eff > 1) msg += '\n效果超群！';
  else if (eff < 1) msg += '\n效果不佳...';
  msg += '\n造成 '+dmg+' 傷害！';
  document.getElementById('btlMsg').textContent = msg;
  updateBattleUI();
  drawBattle();
  if (battle.enemy.hp <= 0) { battleWon(); return; }
  setTimeout(enemyTurn, 800);
}

function doDefend() {
  if (battle.ended) return;
  document.getElementById('btlMsg').textContent = battle.my.name+' 使用左 防禦！\n下次受傷減少！';
  battle.defending = true;
  setTimeout(enemyTurn, 600);
}

function doFlee() {
  if (battle.ended) return;
  if (Math.random() < 0.5) {
    document.getElementById('btlMsg').textContent = '成功逃走！';
    setTimeout(endBattle, 500);
  } else {
    document.getElementById('btlMsg').textContent = '逃走失敗...';
    setTimeout(enemyTurn, 600);
  }
}

function enemyTurn() {
  if (battle.ended) return;
  var dmg = Math.max(1, Math.floor(battle.enemy.atk * (0.8 + Math.random()*0.4) - (battle.defending ? battle.my.def*0.8 : battle.my.def*0.3)));
  battle.my.hp = Math.max(0, battle.my.hp - dmg);
  var msg = battle.enemy.name+' 攻擊左！\n造成 '+dmg+' 傷害！';
  if (battle.defending) msg += '\n（防禦減傷）';
  document.getElementById('btlMsg').textContent = msg;
  battle.defending = false;
  updateBattleUI();
  drawBattle();
  if (battle.my.hp <= 0) {
    battleLost();
    return;
  }
}

function battleWon() {
  battle.ended = true;
  var gainXp = 10 + battle.enemy.lv * 3;
  var gainCoins = 5 + battle.enemy.lv * 2;
  var myPet = game.pets[game.active];
  myPet.xp += gainXp;
  document.getElementById('btlMsg').textContent = '🎉 勝利！\n獲得 '+gainXp+' EXP 同 '+gainCoins+' 金幣！';
  var acts = document.getElementById('btlActs');
  acts.innerHTML = '';
  var el = document.createElement('div');
  el.className = 'act-btn primary';
  el.textContent = '✅ 繼續冒險';
  el.onclick = function() {
    if (myPet.xp >= myPet.xpNext) {
      levelUp(myPet);
    }
    endBattle();
  };
  acts.appendChild(el);
  drawBattle();
}

function battleLost() {
  battle.ended = true;
  document.getElementById('btlMsg').textContent = '💔 '+battle.my.name+' 失去戰鬥能力...\n返回冒險。';
  var acts = document.getElementById('btlActs');
  acts.innerHTML = '';
  var el = document.createElement('div');
  el.className = 'act-btn success';
  el.textContent = '🔙 返回';
  el.onclick = function() {
    var myPet = game.pets[game.active];
    myPet.hp = Math.floor(myPet.maxHp * 0.3); // revive with 30%
    endBattle();
  };
  acts.appendChild(el);
}

function endBattle() {
  battle = null;
  document.getElementById('battle').style.display = 'none';
  document.getElementById('overworld').style.display = 'flex';
  resizeOverworld();
}

function levelUp(pet) {
  pet.xp -= pet.xpNext;
  pet.lv++;
  pet.xpNext = Math.floor(pet.xpNext * 1.4 + 5);
  pet.maxHp = Math.floor(pet.maxHp * 1.12 + 3);
  pet.hp = pet.maxHp;
  pet.atk = Math.floor(pet.atk * 1.08 + 1);
  pet.def = Math.floor(pet.def * 1.08 + 1);
  document.getElementById('lvupT').textContent = '🌟 Lv.'+pet.lv+'!';
  document.getElementById('lvupO').style.display = 'flex';
  setTimeout(function(){document.getElementById('lvupO').style.display='none';}, 1200);
  // Check evolution
  var pd = PET_DATA[pet.id];
  if (pd && pd.evolve && pet.lv >= 10) {
    var newId = pd.evolve;
    var newPd = PET_DATA[newId];
    pet.id = newId;
    pet.name = newPd.name;
    pet.maxHp = Math.max(pet.maxHp, newPd.hp + Math.floor(pet.lv * 5));
    pet.atk = Math.max(pet.atk, newPd.atk + Math.floor(pet.lv * 1.5));
    pet.def = Math.max(pet.def, newPd.def + Math.floor(pet.lv * 1.5));
    document.getElementById('partnerBadge').textContent = '🐾 '+pet.name;
    document.getElementById('evoT').textContent = '✨ 進化！';
    document.getElementById('evoSub').textContent = pet.name+' 誕生！';
    document.getElementById('evoO').style.display = 'flex';
    setTimeout(function(){document.getElementById('evoO').style.display='none';}, 2500);
  }
}

function showBag() {
  // Simple - just show pet names and levels in a modal
  var msg = '';
  for (var i = 0; i < game.pets.length; i++) {
    var p = game.pets[i];
    msg += (i === game.active ? '▶ ' : '  ') + p.name + ' Lv.' + p.lv + ' HP:' + Math.ceil(p.hp) + '/' + p.maxHp + '\n';
  }
  document.getElementById('modalT').textContent = '🎒 寵物隊伍';
  document.getElementById('modalX').textContent = msg;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// ===== BATTLE CANVAS DRAWING =====
function drawBattle() {
  var cvs = document.getElementById('battleCanvas');
  var ctx = cvs.getContext('2d');
  cvs.width = cvs.clientWidth || 320;
  cvs.height = cvs.clientHeight || 300;
  var w = cvs.width;
  var h = cvs.height;

  // Background gradient
  var bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a1a3e');
  bg.addColorStop(0.6, '#2d1b4e');
  bg.addColorStop(1, '#3a2a3e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Ground
  ctx.beginPath();
  ctx.rect(0, h*0.72, w, h*0.28);
  ctx.fillStyle = '#3a6b3a';
  ctx.fill();
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, h*0.72);
  ctx.lineTo(w, h*0.72);
  ctx.stroke();

  // Grass details
  for (var i = 0; i < 12; i++) {
    var gx = Math.random() * w;
    var gy = h*0.74 + Math.random() * h*0.2;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx-2, gy-8);
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx+2, gy-6);
    ctx.strokeStyle = '#4a8a4a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  if (!battle) return;

  // Enemy pet (right side, larger)
  var enSize = Math.min(w*0.3, h*0.35);
  drawPet(ctx, battle.enemy.id, w*0.58, h*0.12, enSize, false, animFrame);

  // Enemy name/level
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(w*0.55, h*0.02, w*0.38, 28, 6);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(battle.enemy.name+' Lv.'+battle.enemy.lv, w*0.74, h*0.04+10);

  // Enemy HP bar beside it
  var eBarW = w*0.35;
  var eBarH = 6;
  var eBarX = w*0.56;
  var eBarY = h*0.05+12;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(eBarX, eBarY, eBarW, eBarH, 3);
  ctx.fill();
  var ePct = battle.enemy.hp / battle.enemy.maxHp;
  var eClr = ePct > 0.5 ? '#4cd964' : ePct > 0.25 ? '#ff9500' : '#ff3b30';
  ctx.fillStyle = eClr;
  ctx.beginPath();
  ctx.roundRect(eBarX, eBarY, eBarW * ePct, eBarH, 3);
  ctx.fill();

  // HP text
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(battle.enemy.hp)+' / '+battle.enemy.maxHp, w*0.74, eBarY+12);

  // My pet (left side, slightly larger)
  var mySize = Math.min(w*0.25, h*0.30);
  drawPet(ctx, battle.my.id, w*0.08, h*0.40, mySize, true, animFrame);

  // My pet HP bar below
  var mBarW = w*0.35;
  var mBarH = 6;
  var mBarX = w*0.08;
  var mBarY = h*0.72 - 18;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(mBarX, mBarY, mBarW, mBarH, 3);
  ctx.fill();
  var mPct = battle.my.hp / battle.my.maxHp;
  var mClr = mPct > 0.5 ? '#4cd964' : mPct > 0.25 ? '#ff9500' : '#ff3b30';
  ctx.fillStyle = mClr;
  ctx.beginPath();
  ctx.roundRect(mBarX, mBarY, mBarW * mPct, mBarH, 3);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '9px sans-serif';
  ctx.fillText(Math.ceil(battle.my.hp)+' / '+battle.my.maxHp, mBarX + mBarW/2, mBarY+12);

  // Attack flash effect
  if (battle._flashTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,255,'+(battle._flashTimer*0.2)+')';
    ctx.fillRect(0, 0, w, h);
    battle._flashTimer -= 0.05;
  }
}

// ===== INIT =====
window.onload = function() {
  // roundRect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      this.moveTo(x+r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };
  }
  init();
};

// Animation loop for battle canvas
setInterval(function() {
  if (document.getElementById('battle').style.display === 'flex' && battle) {
    drawBattle();
  }
}, 50);

</script>
