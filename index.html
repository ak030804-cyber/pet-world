<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>寵物世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f23;font-family:sans-serif;color:#fff}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative}
/* === TITLE === */
#title{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;background:linear-gradient(#0f0f23,#1a1a3e);}
#title h1{font-size:36px;background:linear-gradient(135deg,#f5d76e,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#title p{color:#888;font-size:13px;margin-bottom:20px}
.row{display:flex;gap:12px;margin-bottom:20px}
.card{background:#2a2a4a;border:2px solid #3a3a5a;border-radius:14px;padding:10px;text-align:center;width:90px;cursor:pointer;transition:.15s}
.card.sel{border-color:#f5d76e;box-shadow:0 0 15px rgba(245,215,110,.2)}
.card canvas{display:block;width:64px;height:64px;margin:0 auto 4px}
.card .nm{color:#fff;font-size:13px;font-weight:bold}
.card .el{color:#888;font-size:10px}
.go{background:linear-gradient(#f5d76e,#ff9500);border:none;border-radius:12px;color:#1a1a2e;font-size:18px;font-weight:bold;padding:14px 48px;cursor:pointer;box-shadow:0 4px 0 #b87200}
.go:disabled{opacity:.4}
.go:active{transform:translateY(3px)}
/* === GAME === */
#game{display:none;flex-direction:column;height:100%}
#gCan{flex:1;width:100%;display:block;touch-action:none}
#ctrl{background:#1a1a3a;padding:8px 12px 14px;display:flex;justify-content:center;align-items:center;gap:10px}
.dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:42px 42px;gap:3px}
.db{background:#2a2a4a;border:1px solid #3a3a5a;border-radius:10px;color:#aaa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none}
.db:active{background:#3a3a5a;color:#fff}
#u{grid-column:2;grid-row:1}#l{grid-column:1;grid-row:2}#d{grid-column:2;grid-row:2}#r{grid-column:3;grid-row:2}
.bag{background:#3a2a4a;border:1px solid #5a4a6a;border-radius:10px;color:#d0b0e0;font-size:12px;font-weight:bold;padding:8px 14px;cursor:pointer;white-space:nowrap}
/* === BATTLE === */
#btl{display:none;flex-direction:column;height:100%}
#bCan{flex:1;width:100%;display:block;touch-action:none}
#bUI{background:#0f0f23;padding:6px 10px 12px;border-top:2px solid #2a2a4a}
#hud{display:flex;gap:6px;margin-bottom:4px}
.hc{flex:1;background:rgba(255,255,255,.05);border-radius:8px;padding:4px 8px}
.hc .t{display:flex;justify-content:space-between;font-size:12px}
.hc .pn{color:#fff;font-weight:bold}.hc .lv{color:#888}
.hc .bw{height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;margin:2px 0}
.hc .bf{height:100%;border-radius:3px;transition:width .3s}
.g{background:linear-gradient(90deg,#4cd964,#34c759)}
.y{background:linear-gradient(90deg,#ff9500,#ffcc00)}
.r{background:linear-gradient(90deg,#ff3b30,#ff6b6b)}
.hc .hn{font-size:10px;color:#888;text-align:right}
#acts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px}
.ab{background:#2a2a4a;border:1px solid #3a3a5a;border-radius:10px;color:#ccc;font-size:14px;font-weight:bold;padding:10px 0;text-align:center;cursor:pointer}
.ab:active{background:#3a3a5a}
.ab.gp{background:linear-gradient(#f5d76e,#ff9500);color:#1a1a2e}
.ab.gs{background:linear-gradient(#4cd964,#34c759);color:#1a1a2e}
.ab.gd{background:linear-gradient(#ff3b30,#d62d20);color:#fff}
#msg{background:rgba(0,0,0,.5);border-radius:8px;padding:6px 10px;color:#ddd;font-size:13px;text-align:center;min-height:32px}
/* === MODAL === */
.md{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:20;align-items:center;justify-content:center}
.md>div{background:#2a2a4a;border-radius:16px;padding:20px;text-align:center;width:85%;max-width:300px}
.md h3{font-size:18px;margin-bottom:8px}
.md p{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:14px;white-space:pre-wrap}
.md button{background:linear-gradient(#f5d76e,#ff9500);border:none;border-radius:10px;color:#1a1a2e;font-size:15px;font-weight:bold;padding:10px 30px;cursor:pointer}
.lv{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;align-items:center;justify-content:center;pointer-events:none}
.lv span{font-size:36px;font-weight:bold;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.5);animation:lva 1.2s forwards}
@keyframes lva{0%{transform:scale(2);opacity:0}40%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}
.ev{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:40;background:rgba(0,0,0,.6);align-items:center;justify-content:center;flex-direction:column;gap:8px}
.ev span{font-size:32px;font-weight:bold;color:#fff;text-shadow:0 0 30px rgba(255,255,255,.5)} 
.ev em{font-size:14px;color:#ffd700;font-style:normal}
#bagList{max-height:50vh;overflow-y:auto;text-align:left}
#bagList .it{display:flex;align-items:center;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.06)}
#bagList .it.a{background:rgba(245,215,110,.1);border-radius:8px}
#bagList .it .n{color:#fff;font-size:13px;font-weight:bold}
#bagList .it .d{color:#666;font-size:10px}
#bagList .it .tg{font-size:10px;color:#888;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:8px;margin-left:6px}
.sb{background:#3a3a5a;border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:bold;padding:5px 12px;cursor:pointer}
</style>
</head><body>
<div id="app">

<div id="title">
  <h1>寵物世界</h1>
  <p>揀你嘅第一隻夥伴</p>
  <div class="row" id="pickRow"></div>
  <button class="go" id="goBtn" disabled>出發冒險！</button>
</div>

<div id="game">
  <canvas id="gCan"></canvas>
  <div id="ctrl">
    <div class="dpad">
      <div class="db" id="u">▲</div>
      <div class="db" id="l">◀</div>
      <div class="db" id="d">▼</div>
      <div class="db" id="r">▶</div>
    </div>
    <button class="bag" id="bagBtn">🎒 寵物</button>
  </div>
</div>

<div id="btl">
  <canvas id="bCan"></canvas>
  <div id="bUI">
    <div id="hud">
      <div class="hc"><div class="t"><span class="pn" id="myN"></span><span class="lv" id="myL"></span></div><div class="bw"><div class="bf g" id="myB" style="width:100%"></div></div><div class="hn" id="myH"></div></div>
      <div class="hc"><div class="t"><span class="pn" id="enN"></span><span class="lv" id="enL"></span></div><div class="bw"><div class="bf g" id="enB" style="width:100%"></div></div><div class="hn" id="enH"></div></div>
    </div>
    <div id="acts"></div>
    <div id="msg">選擇行動！</div>
  </div>
</div>

<div class="md" id="mdMain"><div><h3 id="mdT"></h3><p id="mdX"></p><button id="mdBtn">確定</button></div></div>
<div class="lv" id="lvD"><span id="lvT"></span></div>
<div class="ev" id="evD"><span id="evT"></span><em id="evS"></em></div>
<div class="md" id="mdBag"><div style="text-align:left"><h3 style="text-align:center">🎒 寵物隊伍</h3><div id="bagList"></div><button style="width:100%;margin-top:8px" id="bagClose">關閉</button></div></div>

</div>
<script>
"use strict";

(() => {

// Error catcher
window.addEventListener('error', e => {
  document.getElementById('msg').textContent = '⚠️ '+e.message;
});

// ===== PET DRAWING =====
window.drawPet = function(ctx,type,x,y,s,a){
  const b=Math.sin((a||0)*.06)*1.5, h=s/2;
  function rd(c1,c2,rx,ry){const g=ctx.createRadialGradient(x,y-ry*.3,0,x,y,ry);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y+b,rx,ry,0,0,2*Math.PI);ctx.fill();}
  function ey(cx,cy,r){ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(cx,cy+b,r,r*1.1,0,0,2*Math.PI);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(cx+1,cy+1+b,r*.55,r*.65,0,0,2*Math.PI);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-1,cy-1+b,r*.25,0,2*Math.PI);ctx.fill();}
  function bl(cx,cy,r){ctx.fillStyle='rgba(255,150,150,.3)';ctx.beginPath();ctx.ellipse(cx,cy+b,r,r*.6,0,0,2*Math.PI);ctx.fill();}
  function mo(cx,cy){ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy+b,3,.1*Math.PI,.9*Math.PI);ctx.stroke();}
  function lg(x2,y2,c){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x2,y2+b,s*.18,s*.12,0,0,2*Math.PI);ctx.fill();}
  if(type==='fire'){
    rd('#ff8c42','#d63031',h*.85,h*.95);
    for(let i=-1;i<=1;i++){const fx=x+i*h*.4,fy=y-h*.78+b,fs=h*.32;const g=ctx.createRadialGradient(fx,fy,0,fx,fy,fs);g.addColorStop(0,'#ffd93d');g.addColorStop(.5,'#ff9500');g.addColorStop(1,'#d63031');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(fx,fy+fs);ctx.quadraticCurveTo(fx-fs*.8,fy-fs*.2,fx,fy-fs*.5);ctx.quadraticCurveTo(fx+fs*.8,fy-fs*.2,fx,fy+fs);ctx.fill();}
    ey(x-h*.2,y-h*.1,h*.2);ey(x+h*.2,y-h*.1,h*.2);bl(x-h*.4,y+h*.15,h*.15);bl(x+h*.4,y+h*.15,h*.15);mo(x,y+h*.18);lg(x-h*.3,y+h*.7,'#b0302a');lg(x+h*.3,y+h*.7,'#b0302a');
    ctx.fillStyle='#ff9500';ctx.beginPath();ctx.ellipse(x-h*.8,y+h*.25+b,h*.22,h*.14,.3,0,2*Math.PI);ctx.fill();ctx.fillStyle='#ffd93d';ctx.beginPath();ctx.arc(x-h*.95,y+h*.1+b,h*.12,0,2*Math.PI);ctx.fill();
  }else if(type==='water'){
    rd('#81ecec','#00b894',h*.9,h*.95);
    const cy2=y-h*.78+b,cs=h*.28;const g=ctx.createRadialGradient(x,cy2,0,x,cy2,cs);g.addColorStop(0,'#a8e6cf');g.addColorStop(.5,'#81ecec');g.addColorStop(1,'#0984e3');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,cy2,cs,cs*1.4,0,0,2*Math.PI);ctx.fill();
    ey(x-h*.2,y-h*.1,h*.2);ey(x+h*.2,y-h*.1,h*.2);bl(x-h*.4,y+h*.15,h*.15);bl(x+h*.4,y+h*.15,h*.15);mo(x,y+h*.18);
    ctx.fillStyle='#81ecec';ctx.strokeStyle='#00b894';ctx.lineWidth=1.5;for(let s of[-1,1]){ctx.beginPath();ctx.moveTo(x+s*h*.85,y+b);ctx.quadraticCurveTo(x+s*h*.95,y-h*.2+b,x+s*h*.8,y-h*.35+b);ctx.fill();ctx.stroke();}
    lg(x-h*.3,y+h*.7,'#00a87e');lg(x+h*.3,y+h*.7,'#00a87e');
  }else if(type==='grass'){
    rd('#a8e6cf','#00cec9',h*.85,h*.95);
    ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-h*.55+b);ctx.lineTo(x,y-h*.8+b);ctx.stroke();
    const g2=ctx.createRadialGradient(x,y-h*.8+b,0,x,y-h*.8+b,h*.28);g2.addColorStop(0,'#55efc4');g2.addColorStop(1,'#00b894');ctx.fillStyle=g2;ctx.beginPath();ctx.ellipse(x,y-h*.95+b,h*.14,h*.33,-.2,0,2*Math.PI);ctx.fill();
    ey(x-h*.2,y-h*.1,h*.2);ey(x+h*.2,y-h*.1,h*.2);bl(x-h*.4,y+h*.15,h*.15);bl(x+h*.4,y+h*.15,h*.15);mo(x,y+h*.18);
    ctx.fillStyle='#81ecec';ctx.beginPath();ctx.ellipse(x-h*.7,y+h*.1+b,h*.1,h*.18,-.3,0,2*Math.PI);ctx.fill();ctx.beginPath();ctx.ellipse(x+h*.7,y+h*.1+b,h*.1,h*.18,.3,0,2*Math.PI);ctx.fill();
    lg(x-h*.3,y+h*.7,'#00a89e');lg(x+h*.3,y+h*.7,'#00a89e');
  }else if(type==='fire2'){
    rd('#ff6b35','#c0392b',h*.9,h*1.05);
    for(let i=-1;i<=1;i++){const fx=x+i*h*.45,fy=y-h*.78+b,fs=h*.38;const g=ctx.createRadialGradient(fx,fy,0,fx,fy,fs);g.addColorStop(0,'#ffd93d');g.addColorStop(.5,'#ff9500');g.addColorStop(1,'#d63031');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(fx,fy+fs);ctx.quadraticCurveTo(fx-fs*.8,fy-fs*.2,fx,fy-fs*.5);ctx.quadraticCurveTo(fx+fs*.8,fy-fs*.2,fx,fy+fs);ctx.fill();}
    ey(x-h*.2,y-h*.1,h*.22);ey(x+h*.2,y-h*.1,h*.22);bl(x-h*.45,y+h*.15,h*.15);bl(x+h*.45,y+h*.15,h*.15);mo(x,y+h*.18);lg(x-h*.3,y+h*.7,'#8e1a1a');lg(x+h*.3,y+h*.7,'#8e1a1a');
    ctx.fillStyle='#ff9500';ctx.beginPath();ctx.ellipse(x-h*.85,y+h*.35+b,h*.25,h*.16,.3,0,2*Math.PI);ctx.fill();ctx.fillStyle='#ffd93d';ctx.beginPath();ctx.arc(x-1.05*h,y+h*.15+b,h*.14,0,2*Math.PI);ctx.fill();
  }else if(type==='water2'){
    rd('#74b9ff','#0984e3',h*.95,h*1.05);
    const cy2=y-h*.78+b,cs=h*.35;const g=ctx.createRadialGradient(x,cy2,0,x,cy2,cs);g.addColorStop(0,'#a8e6cf');g.addColorStop(.5,'#81ecec');g.addColorStop(1,'#0984e3');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,cy2,cs,cs*1.4,0,0,2*Math.PI);ctx.fill();
    ey(x-h*.2,y-h*.1,h*.22);ey(x+h*.2,y-h*.1,h*.22);bl(x-h*.45,y+h*.15,h*.15);bl(x+h*.45,y+h*.15,h*.15);mo(x,y+h*.18);
    ctx.fillStyle='#74b9ff';ctx.strokeStyle='#0984e3';ctx.lineWidth=1.5;for(let s of[-1,1]){ctx.beginPath();ctx.moveTo(x+s*h*.9,y+b);ctx.quadraticCurveTo(x+s*1.05*h,y-h*.25+b,x+s*.9*h,y-h*.4+b);ctx.fill();ctx.stroke();}
    lg(x-h*.3,y+h*.7,'#0a6eb8');lg(x+h*.3,y+h*.7,'#0a6eb8');
  }else if(type==='grass2'){
    rd('#55efc4','#00b894',h*.9,h*1.05);
    ctx.strokeStyle='#00b894';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y-h*.55+b);ctx.lineTo(x,y-h*.8+b);ctx.stroke();
    const g2=ctx.createRadialGradient(x,y-h*.8+b,0,x,y-h*.8+b,h*.3);g2.addColorStop(0,'#55efc4');g2.addColorStop(1,'#00b894');ctx.fillStyle=g2;ctx.beginPath();ctx.ellipse(x,y-h*.95+b,h*.15,h*.35,-.2,0,2*Math.PI);ctx.fill();
    for(let i=0;i<5;i++){const a=i*1.256;ctx.fillStyle=['#fd79a8','#e84393','#fdcb6e','#e17055','#a29bfe'][i];ctx.beginPath();ctx.ellipse(x+Math.cos(a)*h*.22,y-h*1.05+b+Math.sin(a)*h*.22,h*.1,h*.14,a,0,2*Math.PI);ctx.fill();}
    ctx.fillStyle='#ffeaa7';ctx.beginPath();ctx.arc(x,y-h*1.05+b,h*.08,0,2*Math.PI);ctx.fill();
    ey(x-h*.2,y-h*.1,h*.22);ey(x+h*.2,y-h*.1,h*.22);bl(x-h*.45,y+h*.15,h*.15);bl(x+h*.45,y+h*.15,h*.15);mo(x,y+h*.18);
    ctx.fillStyle='#55efc4';ctx.beginPath();ctx.ellipse(x-h*.7,y+h*.1+b,h*.1,h*.18,-.3,0,2*Math.PI);ctx.fill();ctx.beginPath();ctx.ellipse(x+h*.7,y+h*.1+b,h*.1,h*.18,.3,0,2*Math.PI);ctx.fill();
    lg(x-h*.3,y+h*.7,'#00a87e');lg(x+h*.3,y+h*.7,'#00a87e');
  }else if(type==='bird'){
    rd('#d4a373','#a0785a',h*.8,h*.85);
    ctx.fillStyle='#faedcd';ctx.beginPath();ctx.ellipse(x,y+b+h*.1,h*.45,h*.5,0,0,2*Math.PI);ctx.fill();
    ctx.fillStyle='#e67e22';ctx.beginPath();ctx.moveTo(x+h*.4,y-h*.2+b);ctx.lineTo(x+h*.7,y+b);ctx.lineTo(x+h*.4,y+h*.18+b);ctx.fill();
    ey(x+h*.05,y-h*.25,h*.16);ey(x+h*.25,y-h*.18,h*.14);bl(x-h*.1,y+h*.05,h*.1);
    ctx.fillStyle='#b8956a';ctx.beginPath();ctx.ellipse(x-h*.7,y+b,h*.18,h*.32,.3,0,2*Math.PI);ctx.fill();ctx.beginPath();ctx.ellipse(x+h*.55,y+h*.05+b,h*.16,h*.28,-.3,0,2*Math.PI);ctx.fill();
    ctx.strokeStyle='#e67e22';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-h*.2,y+h*.72+b);ctx.lineTo(x-h*.25,y+h*.92+b);ctx.stroke();ctx.beginPath();ctx.moveTo(x+h*.2,y+h*.72+b);ctx.lineTo(x+h*.25,y+h*.92+b);ctx.stroke();
  }else if(type==='bat'){
    rd('#6c5ce7','#4a3cb5',h*.85,h*.85);
    ctx.fillStyle='#6c5ce7';ctx.beginPath();ctx.moveTo(x-h*.25,y-h*.72+b);ctx.lineTo(x-h*.38,y-h*.95+b);ctx.lineTo(x-h*.05,y-h*.65+b);ctx.fill();
    ctx.fillStyle='#a29bfe';ctx.beginPath();ctx.moveTo(x-h*.2,y-h*.72+b);ctx.lineTo(x-h*.32,y-h*.9+b);ctx.lineTo(x-h*.1,y-h*.68+b);ctx.fill();
    ctx.fillStyle='#6c5ce7';ctx.beginPath();ctx.moveTo(x+h*.25,y-h*.72+b);ctx.lineTo(x+h*.38,y-h*.95+b);ctx.lineTo(x+h*.05,y-h*.65+b);ctx.fill();
    ctx.fillStyle='#a29bfe';ctx.beginPath();ctx.moveTo(x+h*.2,y-h*.72+b);ctx.lineTo(x+h*.32,y-h*.9+b);ctx.lineTo(x+h*.1,y-h*.68+b);ctx.fill();
    ey(x-h*.2,y-h*.1,h*.18);ey(x+h*.2,y-h*.1,h*.18);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-h*.08,y+h*.18+b);ctx.lineTo(x,y+h*.28+b);ctx.lineTo(x+h*.08,y+h*.18+b);ctx.stroke();
    ctx.fillStyle='rgba(108,92,231,.5)';ctx.beginPath();ctx.moveTo(x-h*.7,y-s*.1+b);ctx.quadraticCurveTo(x-h*1.1,y-h*.6+b,x-h*1.3,y+b);ctx.quadraticCurveTo(x-h*1.2,y+h*.1+b,x-h*.7,y+h*.05+b);ctx.fill();
    ctx.beginPath();ctx.moveTo(x+h*.7,y-s*.1+b);ctx.quadraticCurveTo(x+h*1.1,y-h*.6+b,x+h*1.3,y+b);ctx.quadraticCurveTo(x+h*1.2,y+h*.1+b,x+h*.7,y+h*.05+b);ctx.fill();
    lg(x-h*.15,y+h*.65,'#4a3cb5');lg(x+h*.15,y+h*.65,'#4a3cb5');
  }else if(type==='egg'){
    const g=ctx.createRadialGradient(x-h*.1,y-h*.2,0,x,y,h*.9);g.addColorStop(0,'#ff9ff3');g.addColorStop(.6,'#f368e0');g.addColorStop(1,'#c44569');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y+b,h*.7,h*.95,0,0,2*Math.PI);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-h*.25,y-h*.35+b);ctx.lineTo(x-h*.15,y-h*.2+b);ctx.lineTo(x-h*.2,y-h*.05+b);ctx.lineTo(x-h*.1,y+b);ctx.stroke();
    ey(x-h*.2,y-h*.1,h*.18);ey(x+h*.2,y-h*.1,h*.18);bl(x-h*.3,y+h*.1,h*.12);bl(x+h*.3,y+h*.1,h*.12);mo(x,y+h*.12);
    lg(x-h*.2,y+h*.8,'#c44569');lg(x+h*.2,y+h*.8,'#c44569');
  }else if(type==='fox'){
    rd('#e17055','#d63031',h*.8,h*.9);

function drawMap(){
  const cv=document.getElementById('gCan'),cx=cv.getContext('2d');
  const w=cv.width,h=cv.height,ox=w/2,oy=h/2;
  cx.clearRect(0,0,w,h);
  const g=cx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#4a90d9');g.addColorStop(1,'#4a7c3a');cx.fillStyle=g;cx.fillRect(0,0,w,h);
  for(let r=0;r<16;r++)for(let c=0;c<20;c++){
    const t=MAP[r][c],sx=c*ts-G.px*ts+ox,sy=r*ts-G.py*ts+oy;
    if(sx+ts<-ts||sx>w||sy+ts<-ts||sy>h)continue;
    if(t===0){cx.fillStyle=(r*7+c*13)%3?'#5a8f3c':'#4a7f2c';cx.fillRect(sx,sy,ts,ts);if((r*7+c*13)%9===0){cx.fillStyle='#f39c12';cx.beginPath();cx.arc(sx+5+Math.sin(r)*4,sy+5+Math.cos(c)*4,2,0,2*Math.PI);cx.fill();}}
    else if(t===1){cx.fillStyle='#c8b078';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#b8a068';cx.fillRect(sx,sy,ts,1);cx.fillRect(sx,sy,1,ts);}
    else if(t===2){cx.fillStyle='#2d5a1e';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#1d4a0e';cx.beginPath();cx.arc(sx+ts/2,sy+ts/2-3,ts/2.2,0,2*Math.PI);cx.fill();cx.fillStyle='#3a7a2a';cx.beginPath();cx.arc(sx+ts/2-5,sy+ts/2-6,ts/3,0,2*Math.PI);cx.fill();}
    else if(t===3){cx.fillStyle='#3a7bc8';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(sx+4,sy+ts/2-1+Math.sin(G.tic*.03+r)*2,ts-8,2);}
    else if(t===4){cx.fillStyle='#8a7a5a';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#7a6a4a';cx.fillRect(sx+2,sy,ts-4,2);cx.fillRect(sx+2,sy+ts-2,ts-4,2);for(let i=0;i<4;i++)cx.fillRect(sx+4+i*5,sy+2,2,ts-4);}
    else if(t===5){cx.fillStyle='#7a6a4a';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#5a3a1a';cx.fillRect(sx-2,sy-4,ts+4,4);}
    else if(t===6){cx.fillStyle='#5a3a2a';cx.fillRect(sx,sy,ts,ts);cx.fillStyle='#7a5a3a';cx.fillRect(sx+4,sy+4,ts-8,ts-4);cx.fillStyle='#f5d76e';cx.fillRect(sx+ts-10,sy+ts/2-2,3,3);}
  }
  // Player
  const px=ox,py=oy,bob=Math.sin(G.tic*.1)*1.5;
  cx.fillStyle='rgba(0,0,0,.12)';cx.beginPath();cx.ellipse(px,py+ts-4,ts/3,3,0,0,2*Math.PI);cx.fill();
  cx.fillStyle='#4a7ae8';cx.fillRect(px-ts/3,py-ts/4+bob,ts/1.5,ts/2.2);
  cx.fillStyle='#3a5ab8';cx.fillRect(px-ts/4,py+ts/4+bob,ts/5,ts/3);cx.fillRect(px+ts/10,py+ts/4+bob,ts/5,ts/3);
  cx.fillStyle='#f0c8a0';cx.beginPath();cx.arc(px,py-ts/2+bob,ts/4.5,0,2*Math.PI);cx.fill();
  cx.fillStyle='#e74c3c';cx.fillRect(px-ts/4,py-ts/1.8+bob-2,ts/2,ts/7);cx.fillRect(px-ts/5,py-ts/2.5+bob-4,ts/2.5,ts/6);
  cx.fillStyle='#222';cx.fillRect(px-5,py-ts/2-2+bob,3,3);cx.fillRect(px+2,py-ts/2-2+bob,3,3);
  // Badge
  if(G.pts.length){cx.fillStyle='rgba(0,0,0,.5)';cx.beginPath();cx.roundRect?cx.roundRect(ox-45,oy-ts*1.5,90,18,8):cx.fillRect(ox-45,oy-ts*1.5,90,18);cx.fill();cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText(G.pts[G.idx].n+' Lv.'+G.pts[G.idx].lv,ox,oy-ts*1.5+13);}
}
function mv(dx,dy){
  if(G.btl||G.mv)return;
  const nx=G.px+dx,ny=G.py+dy;
  if(nx<0||nx>=20||ny<0||ny>=16)return;
  const t=MAP[ny][nx];if(t===2||t===3||t===4||t===5)return;
  G.px=nx;G.py=ny;G.mv=true;setTimeout(()=>{G.mv=false;},140);
  if(t===0&&Math.random()<.15){startBtl();return;}
  drawMap();
}

// ===== BATTLE =====
function startBtl(){
  G.btl=true;G.bs='m';
  const w=(()=>{const ww=[...WD];return ww[~~(Math.random()*ww.length)];})();
  const p=G.pts[G.idx];const lv=Math.max(1,p.lv-2+~~(Math.random()*4));const lm=1+(lv-1)*.12;
  G.wld={id:w.id,n:w.n,el:w.el,lv,hp:~~(w.hp*lm),mx:~~(w.hp*lm),at:~~(w.at*lm),df:~~(w.df*lm)};
  document.getElementById('game').style.display='none';
  document.getElementById('btl').style.display='flex';sz();
  uBtl();bBtl();setMsg('⚡ 野生 '+G.wld.n+' 出現咗！');
}
function uBtl(){
  const p=G.pts[G.idx],w=G.wld;
  document.getElementById('myN').textContent=({Fire:'🔥',Water:'💧',Grass:'🌿',Normal:'🐤',Flying:'🦇',Psychic:'🥚',Earth:'🐹'})[p.el]+' '+p.n;
  document.getElementById('myL').textContent='Lv.'+p.lv;
  const mp=p.hp/p.mx*100;const mb=document.getElementById('myB');
  mb.style.width=mp+'%';mb.className='bf '+(mp<25?'r':mp<50?'y':'g');
  document.getElementById('myH').textContent=Math.ceil(p.hp)+'/'+p.mx;
  document.getElementById('enN').textContent=w.n;document.getElementById('enL').textContent='Lv.'+w.lv;
  const ep=w.hp/w.mx*100;const eb=document.getElementById('enB');
  eb.style.width=ep+'%';eb.className='bf '+(ep<25?'r':ep<50?'y':'g');
  document.getElementById('enH').textContent=Math.ceil(w.hp)+'/'+w.mx;
}
function bBtl(){document.getElementById('acts').innerHTML='<button class="ab gp">⚔️ 攻擊</button><button class="ab gs">⚡ 捕捉</button><button class="ab gd">🏃 逃走</button><button class="ab">🎒 換寵</button>';
  document.getElementById('acts').children[0].onclick=bAtk;
  document.getElementById('acts').children[1].onclick=bCatch;
  document.getElementById('acts').children[2].onclick=bRun;
  document.getElementById('acts').children[3].onclick=bBag;
}
function setMsg(m){document.getElementById('msg').textContent=m;}
var btlLock=false;

function bAtk(){
  if(G.bs==='m'||btlLock)return;btlLock=true;G.bs='m';
  const p=G.pts[G.idx],w=G.wld;
  let ml=1;if(TC[p.el]&&TC[p.el][w.el])ml=TC[p.el][w.el];
  const d=Math.max(1,~~(p.at*12/w.df*(.85+Math.random()*.3)*ml));
  w.hp=Math.max(0,w.hp-d);
  setMsg(p.n+' 攻擊！-'+(d)+'HP'+(ml>1.5?'💥':ml<.8?'💨':''));
  uBtl();
  if(w.hp<=0){setTimeout(()=>{bWin();btlLock=false;},700);return;}
  setTimeout(()=>{eTurn();btlLock=false;},900);
}
function eTurn(){
  const p=G.pts[G.idx],w=G.wld;
  let ml=1;if(TC[w.el]&&TC[w.el][p.el])ml=TC[w.el][p.el];
  const d=Math.max(1,~~(w.at*10/p.df*(.85+Math.random()*.3)*ml));
  p.hp=Math.max(0,p.hp-d);
  setMsg(w.n+' 反擊！-'+(d)+'HP'+(ml>1.5?'💥':''));
  uBtl();
  if(p.hp<=0){setTimeout(lose,700);return;}
  G.bs='i';setTimeout(()=>{setMsg('輪到你！');bBtl();},700);
}
function bWin(){
  const p=G.pts[G.idx],w=G.wld;
  p.ex=(p.ex||0)+15+w.lv*3;
  if(p.ex>=(p.lv*10)){p.ex-=p.lv*10;p.lv++;p.at=~~(p.at*1.1)+1;p.df=~~(p.df*1.08)+1;p.mx=~~(p.mx*1.08)+5;p.hp=p.mx;
    document.getElementById('lvT').textContent='🌟 '+p.n+'\nLv.'+p.lv+'!';document.getElementById('lvD').style.display='flex';setTimeout(()=>{document.getElementById('lvD').style.display='none';},1200);
    if(p.evLv&&p.lv>=p.evLv&&!p.evd)setTimeout(()=>{evolve(p);},1400);
  }
  setMsg('🎉 勝利！');setTimeout(endBtl,1800);
}
function evolve(p){
  const ev=EV[p.id];if(!ev||p.evd)return;
  document.getElementById('evT').textContent=p.n;document.getElementById('evS').textContent='進化 → '+ev.n+'！';
  document.getElementById('evD').style.display='flex';
  setTimeout(()=>{p.n=ev.n;p.id=ev.to;p.el=ev.el;p.mx=ev.hp;p.hp=ev.hp;p.at=ev.at;p.df=ev.df;p.evd=true;document.getElementById('evD').style.display='none';uBtl();setMsg('🌟 '+p.n+' 進化完成！');},2500);
}
function lose(){
  setMsg('💀 失去戰鬥能力...');
  document.getElementById('acts').innerHTML='<button class="ab gp" style="grid-column:1/3">返回起點</button>';
  document.getElementById('acts').children[0].onclick=()=>{G.pts.forEach(p=>p.hp=p.mx);G.px=10;G.py=8;endBtl();};
}
function bCatch(){
  if(G.bs==='m'||btlLock)return;btlLock=true;G.bs='m';
  const w=G.wld;
  if(G.pts.length>=6){setMsg('隊伍已滿！');G.bs='i';btlLock=false;setTimeout(bBtl,700);return;}
  if(Math.random()<.25+(1-w.hp/w.mx)*.5-(w.r?.3:0)){
    G.pts.push({id:w.id+'_'+Date.now(),n:w.n,el:w.el,lv:w.lv,hp:w.mx,mx:w.mx,at:w.at,df:w.df,ex:0,evLv:null,evd:false});
    setMsg('🎉 成功捕捉 '+w.n+'！');setTimeout(()=>{btlLock=false;endBtl();},1200);
  }else{setMsg(w.n+' 掙脫了！');btlLock=false;setTimeout(eTurn,800);}
}
function bRun(){
  if(G.bs==='m'||btlLock)return;btlLock=true;G.bs='m';
  if(Math.random()<.55){setMsg('成功逃走！💨');setTimeout(()=>{btlLock=false;endBtl();},700);}
  else{setMsg('逃唔到！😰');btlLock=false;setTimeout(eTurn,700);}
}
function bBag(){
  const bm=document.getElementById('mdBag');
  const bl=document.getElementById('bagList');
  if(!G.pts.length)bl.innerHTML='<div style="color:#666;padding:16px;text-align:center">暫冇寵物</div>';
  else bl.innerHTML=G.pts.map((x,i)=>{const a=i===G.idx;return '<div class="it'+(a?' a':'')+'" onclick="'+(a?'':x.hp>0?'swBtl('+i+')':'')+'"><div style="flex:1"><div class="n">'+x.n+(a?' ⭐':'')+'</div><div class="d">Lv.'+x.lv+' | HP:'+Math.ceil(x.hp)+'/'+x.mx+'</div></div><span class="tg">'+x.el+'</span></div>';}).join('');
  bm.style.display='flex';
}
window.swBtl=function(i){G.idx=i;G.bs='i';document.getElementById('mdBag').style.display='none';setMsg('換出 '+G.pts[i].n+'！');uBtl();
  const acts=document.getElementById('acts');
  setTimeout(bBtl,700);};
function endBtl(){G.btl=false;document.getElementById('btl').style.display='none';document.getElementById('game').style.display='flex';sz();drawMap();}

function drBtl(){
  const cv=document.getElementById('bCan'),cx=cv.getContext('2d');
  const w=cv.width,h=cv.height;
  cx.clearRect(0,0,w,h);
  const sg=cx.createLinearGradient(0,0,0,h);sg.addColorStop(0,'#3a6bca');sg.addColorStop(.4,'#5a8a6a');sg.addColorStop(1,'#3a6b3a');cx.fillStyle=sg;cx.fillRect(0,0,w,h);
  cx.fillStyle='rgba(255,255,255,.06)';
  for(let i=0;i<4;i++){const cx2=w*(.1+.2*i)+Math.sin(G.tic*.005+i)*20;cx.beginPath();cx.ellipse(cx2,h*.13,40+Math.sin(i*5)*12,12,0,0,2*Math.PI);cx.fill();}
  cx.fillStyle='#4a7c3a';cx.fillRect(0,h-45,w,45);cx.fillStyle='#3a6c2a';cx.fillRect(0,h-48,w,4);
  for(let i=0;i<w;i+=6){cx.fillStyle=['#5a8f3c','#4a7c3a','#6a9f4c'][i%3];cx.fillRect(i,h-45-4+Math.sin(i*.2+G.tic*.02)*3,3,4+Math.sin(i*.1)*2);}
  if(G.wld)window.drawPet(cx,G.wld.id,w*.72-25,h-70-15,50,G.tic);

}

document.getElementById('bagBtn').addEventListener('click',()=>{
  const bm=document.getElementById('mdBag');const bl=document.getElementById('bagList');
  if(!G.pts.length)bl.innerHTML='<div style="color:#666;padding:16px;text-align:center">暫冇寵物</div>';
  else bl.innerHTML=G.pts.map((x,i)=>{const a=i===G.idx;return '<div class="it'+(a?' a':'')+'"><div style="flex:1"><div class="n">'+x.n+(a?' ⭐':'')+'</div><div class="d">Lv.'+x.lv+' | HP:'+Math.ceil(x.hp)+'/'+x.mx+'</div></div><span class="tg">'+x.el+'</span></div>';}).join('');
  bm.style.display='flex';
});

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(G.btl||!e.key.startsWith('Arrow'))return;
  e.preventDefault();
  const dir={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]}[e.key];
  mv(dir[0],dir[1]);
});

// ===== LOOP =====
function loop(){
  G.tic++;
  if(G.btl){drBtl();}else if(document.getElementById('game').style.display!=='none'){drawMap();}
  requestAnimationFrame(loop);
}

// ===== INIT =====
window.onload=function(){sz();window.addEventListener('resize',sz);initTitle();loop();console.log('✅ Game loaded');};

})();
</script>
