<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>常識測驗 - 19-21課</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'PingFang TC','Segoe UI',sans-serif;background:#0f0f2a;color:#fff}
#app{width:100%;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;position:relative}
#title{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0f2a,#1a1050,#162878);padding:20px}
#title h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
#title .sub{color:rgba(255,255,255,.2);font-size:11px;letter-spacing:3px;margin-bottom:16px}
.si{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 14px;margin-bottom:8px;width:88%;max-width:320px}
.si label{font-size:10px;color:rgba(255,255,255,.35);display:block;margin-bottom:2px}
.si input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:9px 12px;color:#fff;font-size:14px;width:100%;outline:none}
.si input:focus{border-color:#74b9ff}
.gb{background:linear-gradient(135deg,#74b9ff,#a29bfe);border:none;border-radius:14px;color:#0f0f2a;font-size:16px;font-weight:700;padding:14px 44px;margin-top:10px;cursor:pointer;box-shadow:0 4px 0 #5a6ad8;transition:all .08s;letter-spacing:1px}
.gb:active{transform:translateY(4px);box-shadow:0 0 0 #5a6ad8}
#quiz{display:none;flex-direction:column;height:100%;background:linear-gradient(180deg,#0f0f2a,#1a1050,#162878)}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px}
#hdr .nm{font-size:14px;font-weight:600}#hdr .sc{font-size:12px;color:#f5d76e}#hdr .pg{font-size:10px;color:rgba(255,255,255,.3)}
#prog{height:2px;background:rgba(255,255,255,.04);margin:0 14px;border-radius:2px;overflow:hidden}
#prog .bf{height:100%;background:linear-gradient(90deg,#74b9ff,#a29bfe);border-radius:2px;transition:width .4s ease}
#qa{flex:1;display:flex;flex-direction:column;padding:10px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#qType{font-size:10px;color:rgba(255,255,255,.15)}
#qNum{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:4px}
#qTxt{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:10px;padding:0 2px}
#qTxt .bl{display:inline-block;min-width:50px;border-bottom:2px dashed rgba(116,185,255,.3);margin:0 2px;color:#74b9ff;font-weight:700}
/* Diagram */
#diagram{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:10px;margin-bottom:10px;text-align:center}
#diagram .d-label{font-size:9px;color:rgba(255,255,255,.2);margin-bottom:6px}
#diagram .d-grid{display:grid;gap:6px}
#diagram .d-grid.c2{grid-template-columns:1fr 1fr}
#diagram .d-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
#diagram .d-item{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 4px;text-align:center}
#diagram .d-item .d-icon{font-size:28px;display:block;margin-bottom:2px}
#diagram .d-item .d-label{font-size:9px;color:rgba(255,255,255,.4)}
/* Word bank */
#wb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:8px 10px;margin-bottom:10px}
#wb .wl{font-size:9px;color:rgba(255,255,255,.2);margin-bottom:4px}
#wb .ww{display:flex;flex-wrap:wrap;gap:4px}
.ww-word{background:rgba(116,185,255,.08);border:1px solid rgba(116,185,255,.12);border-radius:6px;padding:3px 8px;font-size:12px;color:#74b9ff;cursor:pointer;touch-action:none}
.ww-word:active{background:rgba(116,185,255,.15);transform:scale(.95)}
.ww-word.us{opacity:.2;pointer-events:none}
#opts{display:flex;flex-direction:column;gap:5px}
.opt{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);border-radius:11px;padding:10px 12px;cursor:pointer;transition:all .12s;font-size:14px;touch-action:none}
.opt:active{transform:scale(.98)}
.opt.sl{border-color:#74b9ff;background:rgba(116,185,255,.06)}
.opt.cr{border-color:#4cd964!important;background:rgba(76,217,100,.08)!important}
.opt.wr{border-color:#ff3b30!important;background:rgba(255,59,48,.08)!important}
.opt.ds{pointer-events:none;opacity:.5}
.opt .tg{display:inline-block;background:rgba(255,255,255,.04);border-radius:4px;padding:0 6px;font-size:10px;color:rgba(255,255,255,.25);margin-right:6px;font-weight:600}
.opt.cr .tg{background:rgba(76,217,100,.12);color:#4cd964}
.opt.wr .tg{background:rgba(255,59,48,.12);color:#ff3b30}
#fa{display:none;flex-direction:column;margin-top:4px}
#fi{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;color:#fff;font-size:15px;text-align:center;outline:none;width:100%}
#fi:focus{border-color:#74b9ff}
#fs{background:linear-gradient(135deg,#74b9ff,#a29bfe);border:none;border-radius:10px;color:#0f0f2a;font-size:14px;font-weight:700;padding:10px;margin-top:5px;cursor:pointer}
#fs:active{transform:translateY(2px)}
#fb{display:none;margin-top:8px;padding:8px 10px;border-radius:10px;font-size:12px;line-height:1.4;gap:6px;flex-direction:column}
#fb .ic{font-size:15px}
#fb.cr{background:rgba(76,217,100,.06);border:1px solid rgba(76,217,100,.12);display:flex}
#fb.wr{background:rgba(255,59,48,.06);border:1px solid rgba(255,59,48,.12);display:flex}
#fb .an{color:#74b9ff;font-weight:600}
#nb{background:linear-gradient(135deg,#74b9ff,#a29bfe);border:none;border-radius:10px;color:#0f0f2a;font-size:14px;font-weight:700;padding:10px 0;margin-top:6px;cursor:pointer;display:none;width:100%}
#nb:active{transform:translateY(2px)}
#res{display:none;flex-direction:column;height:100%;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0f2a,#1a1050,#162878);padding:20px}
#res .re{font-size:52px;margin-bottom:8px}#res h2{font-size:24px;font-weight:800;margin-bottom:4px}
#res .rs{color:rgba(255,255,255,.3);font-size:12px;margin-bottom:14px}
#res .sb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 26px;margin-bottom:14px;text-align:center}
#res .sb .bg{font-size:38px;font-weight:800;color:#f5d76e}#res .sb .dt{font-size:12px;color:rgba(255,255,255,.35);margin-top:3px}
#res .br{display:flex;gap:8px}#res .br button{background:linear-gradient(135deg,#74b9ff,#a29bfe);border:none;border-radius:10px;color:#0f0f2a;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer}
#res .br .s2{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4)}
#rv{display:none;flex-direction:column;height:100%;background:linear-gradient(180deg,#0f0f2a,#1a1050)}
#rv .list{flex:1;overflow-y:auto;padding:6px 12px;-webkit-overflow-scrolling:touch}
.rvi{border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.rvi .q{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3}
.rvi .a{font-size:10px;color:rgba(255,255,255,.35)}
.rvi .a .y{color:#4cd964;font-weight:600}.rvi .a .n{color:#ff3b30;font-weight:600}
.rvi .tr{display:inline-block;font-size:9px;padding:1px 6px;border-radius:5px;margin-bottom:3px}
.rvi .tr.ok{background:rgba(76,217,100,.08);color:#4cd964}.rvi .tr.fail{background:rgba(255,59,48,.08);color:#ff3b30}
</style>
</head><body>
<div id="app">
<div id="title">
  <h1>📝 常識測驗</h1>
  <div class="sub">一 年 級 · 19 - 21 課</div>
  <div class="si"><label>👤 姓名</label><input id="ni" value="謝蕊安"></div>
  <div class="si"><label>📚 範圍</label><input id="ti" value="一年級常識 19-21課 聲光磁"></div>
  <button class="gb" id="sb">開始測驗！</button>
</div>

<div id="quiz">
  <div id="hdr"><span class="nm" id="sn"></span><span class="pg" id="qp"></span><span class="sc" id="ss"></span></div>
  <div id="prog"><div class="bf" id="pb"></div></div>
  <div id="qa">
    <div id="qType"></div><div id="qNum"></div><div id="qTxt"></div>
    <div id="diagram"></div><div id="wb"></div><div id="fa"><input id="fi" placeholder="輸入答案..." autocomplete="off"><button id="fs">提交答案</button></div>
    <div id="opts"></div>
    <div id="fb"><span class="ic"></span><span class="msg"></span></div>
    <button id="nb">下一題 ▶</button>
  </div>
</div>

<div id="res">
  <div class="re" id="re">🎉</div><h2 id="rt">測驗完成！</h2><div class="rs" id="rsub"></div>
  <div class="sb"><div class="bg" id="rsc">0/26</div><div class="dt" id="rdt"></div></div>
  <div class="br"><button id="rvb">📋 覆卷</button><button class="s2" id="ryb">🔄 再考</button></div>
</div>

<div id="rv"><div class="list" id="rvl"></div></div>

<script>
"use strict";(()=>{

const WB = ['氣體','吸','鐵','振動','直線','南','辨別方向','大','媒介','光線','北','聲音','黑色','半透明體','排斥','吸引'];

// Questions
// t: wb=wordbank, tf=true/false, mc=choice, exp=experiment
const QS = [
  // === 填充題（詞語庫）13題 ===
  {t:'wb',q:'物體嘅振動幅度越______，產生嘅聲音越大。',a:'大'},
  {t:'wb',q:'指南針能幫助我哋______。',a:'辨別方向'},
  {t:'wb',q:'聲音可以透過______、固體同液體傳播。',a:'氣體'},
  {t:'wb',q:'當我哋講嘢時，喉嚨入面嘅聲帶______，從而產生聲音。',a:'振動'},
  {t:'wb',q:'磁鐵能吸攝______造嘅嘢。',a:'鐵'},
  {t:'wb',q:'能讓部分光穿透嘅嘢，稱為______。',a:'半透明體'},
  {t:'wb',q:'光係行______嘅。',a:'直線'},
  {t:'wb',q:'磁鐵有同極相______同異極相______嘅特性。',a:'排斥,吸引'},
  {t:'wb',q:'物體振動時會產生______。',a:'聲音'},
  {t:'wb',q:'所有不透明體嘅影子都係______嘅。',a:'黑色'},
  {t:'wb',q:'唔同嘅______傳送聲音嘅效果都唔同。',a:'媒介'},
  {t:'wb',q:'當無______，我哋就睇唔到嘢。',a:'光線'},
  {t:'wb',q:'磁鐵嘅兩端稱為______極同______極。',a:'北,南'},
  
  // === 是非題 10題 ===
  {t:'tf',q:'當無熱，我哋就睇唔到嘢。',a:false},
  {t:'tf',q:'當光照喺唔透明嘅物體上，會受到阻擋，形成聲音。',a:false},
  {t:'tf',q:'物體振動幅度越小，發出嘅聲音便越小。',a:true},
  {t:'tf',q:'光能穿透鐵造嘅物體。',a:false},
  {t:'tf',q:'光以曲線傳播，遇到唔透明物體會形成影子。',a:false},
  {t:'tf',q:'所有不透明體嘅影子都係黑色嘅。',a:true},
  {t:'tf',q:'磁鐵嘅兩端係南極同北極，有異極相斥嘅特性。',a:false},
  {t:'tf',q:'越大力敲打木門，振動幅度越大，產生嘅聲音越小。',a:false},
  {t:'tf',q:'木嘅傳聲效果較空氣嘅好。',a:true},
  {t:'tf',q:'能讓部分光穿透嘅物體，稱為透明體。',a:false},
  
  // === 圈出適當答案 ===
  {t:'mc',q:'聲音可經由空氣、水和木等媒介______。',o:['傳播','傳染'],a:0},
  
  // === 看圖選擇題 ===
  {t:'mc-img',q:'以下邊D情況會產生聲音？',d:['🧑 拍打枱面','👧 輕輕放杯','🧍 企定定','📚 圖書館睇書'],a:[0],m:'可選多個答案'},
  {t:'mc-img',q:'第一組：邊個敲打方法音量較大？',d:['🥁 用力敲鼓（聲波大）','🥁 輕輕敲鼓（聲波細）'],a:0},
  {t:'mc-img',q:'第二組：邊個敲打方法音量較大？',d:['🥤 輕敲玻璃杯（裂痕細）','🥤 大力敲玻璃杯（裂痕大）'],a:1},
  
  // === 看圖分類 ===
  {t:'mc-img',q:'以下邊個係不透明體？',d:['⚪ 波','🪟 玻璃窗','🥛 水杯','📕 書本'],a:[0,3],m:'可選多個答案'},
  {t:'mc-img',q:'以下邊個係透明體？',d:['⚪ 波','🪟 玻璃窗','🥛 透明水杯','📕 書本'],a:[1,2],m:'可選多個答案'},
  
  // === 音量題 ===
  {t:'mc-img',q:'A) 用力拍枱  B) 用力拍手  C) 輕力拍枱  D) 輕力拍手\n邊D發出較大音量？',d:['A: 用力拍枱🔊','B: 用力拍手🔊','C: 輕力拍枱🔉','D: 輕力拍手🔉'],a:[0,1],m:'可選多個答案'},
  
  // === 實驗題 ===
  {t:'mc',q:'根據實驗，佢係測試物料嘅邊項特性？',o:['硬度','透光率','吸水程度'],a:1},
];

var G = {n:'',t:'',i:0,c:0,r:[],lk:0,us:[]};

function $(id){return document.getElementById(id);}

function init(){
  $('sb').addEventListener('click',go);
  $('nb').addEventListener('click',next);
  $('fs').addEventListener('click',checkFill);
  $('fi').addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
  $('rvb').addEventListener('click',showRV);
  $('ryb').addEventListener('click',()=>{$('res').style.display='none';$('title').style.display='flex';});
}

function go(){
  G={n:$('ni').value||'考生',t:$('ti').value||'常識測驗',i:0,c:0,r:[],lk:0,us:[]};
  $('title').style.display='none';$('quiz').style.display='flex';
  $('sn').textContent='📝 '+G.n;rq();
}

function rq(){
  const q=QS[G.i];G.lk=0;
  $('qp').textContent=(G.i+1)+'/'+QS.length;
  $('ss').textContent='✅ '+G.c;
  $('pb').style.width=((G.i+1)/QS.length*100)+'%';
  $('fb').className='fb';$('fb').style.display='none';
  $('nb').style.display='none';
  $('opts').style.display='none';$('opts').innerHTML='';
  $('wb').style.display='none';$('wb').innerHTML='';
  $('fa').style.display='none';$('fi').value='';$('fs').disabled=false;$('fi').disabled=false;
  $('diagram').style.display='none';$('diagram').innerHTML='';
  
  let tn='';
  if(q.t==='wb')tn='✏️ 填充題（用詞語庫）';
  else if(q.t==='tf')tn='⭕ 是非題';
  else if(q.t==='mc')tn='🔘 選擇題';
  else if(q.t==='mc-img')tn='🖼️ 看圖題';
  $('qType').textContent=tn;
  $('qNum').textContent='第 '+(G.i+1)+' 題（共 '+QS.length+' 題）';
  
  let txt=q.q;
  txt=txt.replace(/______/g,'<span class="bl"></span>').replace(/________/g,'<span class="bl" style="min-width:55px"></span>');
  txt=txt.replace(/\n/g,'<br>');
  $('qTxt').innerHTML=txt;
  
  // Diagram
  if(q.d){
    $('diagram').style.display='block';
    const d=$('diagram');
    if(q.d.length>4){d.innerHTML='<div class="d-label">📊 圖片情境</div><div class="d-grid c2">'+q.d.map((x,i)=>'<div class="d-item"><span class="d-icon">'+(x.match(/^.{1,2}/)?.[0]||'')+'</span><span class="d-label">'+(q.m?'':'')+String.fromCharCode(65+i)+'. '+x.replace(/^.{1,2}\s?/,'')+'</span></div>').join('')+'</div>';}
    else{d.innerHTML='<div class="d-label">📊 圖片情境</div><div class="d-grid c4">'+q.d.map((x,i)=>'<div class="d-item"><span class="d-icon">'+(x.match(/^.{1,2}/)?.[0]||'')+'</span><span class="d-label">'+String.fromCharCode(65+i)+'. '+x.replace(/^.{1,2}\s?/,'')+'</span></div>').join('')+'</div>';}
  }
  
  if(q.t==='wb'){
    const w=$('wb');w.style.display='block';
    w.innerHTML='<div class="wl">📦 詞語庫（撳字填答案）</div><div class="ww"></div>';
    const ww=w.querySelector('.ww');
    WB.forEach(w=>{
      const e=document.createElement('span');e.className='ww-word'+(G.us.includes(w)?' us':'');
      e.textContent=w;
      e.addEventListener('click',()=>{if(!e.classList.contains('us')){$('fi').value=w;checkFill();}});
      ww.appendChild(e);
    });
    $('fa').style.display='flex';
  } else if(q.t==='tf'){
    const o=$('opts');o.style.display='flex';
    [['✅ 正確（√）',true],['❌ 唔正確（×）',false]].forEach(([l,v])=>{
      const d=document.createElement('div');d.className='opt';
      d.innerHTML='<span class="tg">?</span>'+l;
      d.addEventListener('click',()=>chkTF(v));
      o.appendChild(d);
    });
  } else if(q.t==='mc'||q.t==='mc-img'){
    const o=$('opts');o.style.display='flex';
    q.o.forEach((x,i)=>{
      const d=document.createElement('div');d.className='opt';
      d.innerHTML='<span class="tg">'+String.fromCharCode(65+i)+'</span>'+x;
      d.addEventListener('click',()=>chkMC(i,Array.isArray(q.a)));
      o.appendChild(d);
    });
  }
}

function checkFill(){
  if(G.lk)return;G.lk=1;
  const v=$('fi').value.trim();if(!v){G.lk=0;return;}
  const q=QS[G.i];G.us.push(v);
  const aa=q.a.split(',');const cr=aa.some(a=>v.includes(a)||a.includes(v));
  fb(cr,q.a);if(cr){G.c++;G.r.push(1);}else G.r.push(0);
  $('nb').style.display='block';$('fs').disabled=true;$('fi').disabled=true;$('ss').textContent='✅ '+G.c;
}

function chkTF(v){
  if(G.lk)return;G.lk=1;
  const q=QS[G.i],cr=v===q.a;
  const o=document.querySelectorAll('.opt');o.forEach(e=>e.classList.add('ds'));
  if(cr){o[0].classList.add(v?'cr':'wr');const ci=v?1:0;o[ci].classList.add('cr');G.c++;G.r.push(1);}
  else{const ci=v?0:1;o[ci].classList.add('wr');o[1-ci].classList.add('cr');G.r.push(0);}
  fb(cr,q.a?'✅正確（√）':'❌唔正確（×）');
  $('nb').style.display='block';$('ss').textContent='✅ '+G.c;
}

var selMC=[];
function chkMC(i,mul){
  if(G.lk&&!mul)return;
  const q=QS[G.i];
  if(mul&&!G.lk){
    selMC.push(i);
    const o=document.querySelectorAll('.opt');
    o[i].classList.toggle('sl');
    // Show submit button
    return;
  }
  G.lk=1;
  const cr=i===q.a;
  const o=document.querySelectorAll('.opt');o.forEach(e=>e.classList.add('ds'));
  o[i].classList.add(i===q.a?'cr':'wr','sl');
  o[q.a].classList.add('cr');
  if(cr){G.c++;G.r.push(1);}else G.r.push(0);
  fb(cr,q.o[q.a]);$('nb').style.display='block';$('ss').textContent='✅ '+G.c;
}

function fb(cr,ans){
  const f=$('fb');
  f.className='fb '+(cr?'cr':'wr');
  f.innerHTML=cr?'<span class="ic">✅</span><span class="msg">答啱！好嘢！</span>':'<span class="ic">❌</span><span class="msg">答錯～ 正確答案：<span class="an">'+ans+'</span></span>';
  f.style.display='flex';
}

function next(){
  G.i++;if(G.i>=QS.length)showRes();else{$('fs').disabled=false;$('fi').disabled=false;selMC=[];rq();}
}

function showRes(){
  $('quiz').style.display='none';$('res').style.display='flex';
  const p=Math.round(G.c/QS.length*100);
  const em=p>=90?'🏆':p>=70?'🎉':p>=50?'👍':'💪';
  const ti=p>=90?'超叻！':p>=70?'好嘢！':p>=50?'唔錯！':'加油呀！';
  $('re').textContent=em;$('rt').textContent=ti;
  $('rsub').textContent=G.n+' - '+G.t;
  $('rsc').textContent=G.c+'/'+QS.length;
  $('rdt').textContent='答啱 '+G.c+' 題，答錯 '+(QS.length-G.c)+' 題（'+p+'%）';
}

function showRV(){
  $('res').style.display='none';
  const el=$('rv');el.style.display='flex';
  // Close handler
  if(!el._close){
    const h=document.createElement('div');h.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04)';
    h.innerHTML='<span style="font-size:14px;font-weight:600">📋 覆卷</span><span id="rvc" style="font-size:11px;color:rgba(255,255,255,.3);cursor:pointer">✕ 關閉</span>';
    el.insertBefore(h,el.firstChild);
    h.querySelector('#rvc').addEventListener('click',()=>{el.style.display='none';$('res').style.display='flex';});
    el._close=true;
  }
  const l=$('rvl');l.innerHTML='';
  QS.forEach((q,i)=>{
    const ok=G.r[i];const d=document.createElement('div');d.className='rvi';
    d.innerHTML='<div class="tr '+(ok?'ok':'fail')+'">'+(ok?'✅ 答啱':'❌ 答錯')+'</div><div class="q">'+(i+1)+'. '+q.q.replace(/______/g,'____')+'</div><div class="a">答案：<span class="y">'+(q.a||'')+'</span></div>';
    l.appendChild(d);
  });
}

window.onload=function(){init();};
})();
</script>
</body>
</html>
